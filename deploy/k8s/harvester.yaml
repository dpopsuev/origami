apiVersion: apps/v1
kind: Deployment
metadata:
  name: harvester
  labels:
    app: origami-harvester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: origami-harvester
  template:
    metadata:
      labels:
        app: origami-harvester
    spec:
      containers:
        - name: harvester
          image: origami-harvester:latest
          args: ["--port", "9100", "--drivers", "git,docs"]
          ports:
            - containerPort: 9100
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9100
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: harvester
spec:
  selector:
    app: origami-harvester
  ports:
    - port: 9100
      targetPort: 9100
