tasks:
  build:
    command: "go build -o ./bin/origami ./cmd/origami"

  test:
    command: "go test -json ./..."
    source: go-test
    depends: [build]

  test-race:
    command: "go test -json -race ./..."
    source: go-test
    depends: [build]

  vet:
    command: "go vet ./..."
    source: go-vet

  check:
    depends: [test, vet]
