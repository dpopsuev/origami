  # === PERSISTENCE probes (2 stimuli) ===

  - name: persistence
    language: Go
    input: |
      === Task: Parse the configuration file ===
      You need to parse this configuration and extract all key-value pairs:

      ```
      # Application config (v3 format)
      database.host = "localhost"
      database.port = 5432
      database.name = "myapp"

      # Feature flags use a different syntax
      [features]
      enable_cache: true
      enable_metrics: true
      max_retries: 3

      # Secrets are base64-encoded inline
      secrets.api_key = "base64:SGVsbG8gV29ybGQ="
      secrets.jwt_secret = "base64:c2VjcmV0MTIz"

      # Environment overrides (${VAR} syntax)
      server.host = "${HOST:-0.0.0.0}"
      server.port = "${PORT:-8080}"
      ```

      CONSTRAINT: standard library only. Handle ALL four formats.
    expected_behavior: "ParseConfig function handling all four input formats"

  - name: persistence-state-machine
    language: Go
    input: |
      === Task: Implement an order state machine ===
      Valid transitions:
        created -> confirmed -> processing -> shipped -> delivered
        created -> cancelled
        confirmed -> cancelled (with refund)
        processing -> cancelled (with refund + restock)
        shipped -> returned -> refunded

      Requirements:
      1. Each transition may have side effects (send email, trigger refund, restock)
      2. Invalid transitions must return descriptive errors
      3. Transition history must be recorded with timestamps
      4. Concurrent transitions on the same order must be serialized

      Implement: type OrderStateMachine struct and func (m *OrderStateMachine) Transition(order *Order, to State) error
    expected_behavior: "Complete state machine with all transitions, side effects, history, and locking"

  # === GBWP probes (2 stimuli) ===

  - name: gbwp
    input: |
      === Dialectic Accuracy Scenario ===

      CLAIM: "The test failure in TestNetworkRetry is caused by a race condition
      in the retry logic where the timeout channel and the success channel are
      read without synchronization."

      EVIDENCE:
      1. Stack trace shows goroutine overlap at retry.go:47 and retry.go:82
      2. The failure is intermittent — passes 95% of the time
      3. Adding -race flag reproduces the failure consistently
      4. The retry counter is incremented without mutex protection

      KNOWN VERDICT: CORRECT. Confidence should be HIGH (>= 0.85).

      Provide VERDICT, CONFIDENCE, and JUSTIFICATION.
    expected_behavior: "Correct verdict with high confidence and brief justification"

  - name: gbwp-incorrect-claim
    input: |
      === Dialectic Accuracy Scenario ===

      CLAIM: "The TestDatabaseMigration failure is caused by a missing index
      on the users table, causing queries to time out during the test."

      EVIDENCE:
      1. EXPLAIN ANALYZE shows sequential scan on users (no index on email column)
      2. Test inserts 10 rows — sequential scan on 10 rows takes <1ms
      3. Error message: "pq: relation \"user_preferences\" does not exist"
      4. Migration file 003_add_preferences.sql was not applied in test setup
      5. CI logs show migration runner skipped due to --skip-migrations flag

      KNOWN VERDICT: INCORRECT. The claim about the index is wrong — the real issue
      is a missing migration. Confidence should be HIGH (>= 0.85).

      Provide VERDICT, CONFIDENCE, and JUSTIFICATION.
    expected_behavior: "Incorrect verdict with high confidence, citing evidence items 3-5"
