stimuli:
  # === REFACTOR probes (5 stimuli) ===

  - name: refactor
    language: Go
    input: |
      func d(a []int, b string, c bool) (int, string, error) {
      	r := 0
      	s := ""
      	for i := 0; i < len(a); i++ {
      		if a[i] > 0 {
      			r = r + a[i]
      			if c {
      				s = s + fmt.Sprintf("%d,", a[i])
      			}
      		} else if a[i] < 0 {
      			r = r - a[i]
      			if c {
      				s = s + fmt.Sprintf("(%d),", a[i])
      			}
      		}
      	}
      	if r == 0 {
      		return 0, "", fmt.Errorf("empty result for %s", b)
      	}
      	if b != "" {
      		s = b + ": " + s
      	}
      	return r, s, nil
      }
    expected_behavior: "Refactored code with descriptive names, split functions, and comments"

  - name: refactor-http-handler
    language: Go
    input: |
      func h(w http.ResponseWriter, r *http.Request) {
      	b, _ := io.ReadAll(r.Body)
      	var d map[string]interface{}
      	json.Unmarshal(b, &d)
      	n := d["name"].(string)
      	e := d["email"].(string)
      	if n == "" || e == "" {
      		w.WriteHeader(400)
      		w.Write([]byte("bad"))
      		return
      	}
      	db, _ := sql.Open("postgres", os.Getenv("DB"))
      	db.Exec("INSERT INTO users (name, email) VALUES ($1, $2)", n, e)
      	w.WriteHeader(200)
      	w.Write([]byte("ok"))
      }
    expected_behavior: "Proper error handling, input validation, connection pooling, SQL injection prevention"

  - name: refactor-retry-loop
    language: Go
    input: |
      func fetch(u string) ([]byte, error) {
      	var b []byte
      	var e error
      	for i := 0; i < 5; i++ {
      		r, e := http.Get(u)
      		if e != nil {
      			time.Sleep(time.Duration(i) * time.Second)
      			continue
      		}
      		b, e = io.ReadAll(r.Body)
      		r.Body.Close()
      		if r.StatusCode == 200 {
      			return b, nil
      		}
      		time.Sleep(time.Duration(i) * time.Second)
      	}
      	return nil, e
      }
    expected_behavior: "Exponential backoff, context support, proper body close, configurable retry"

  - name: refactor-csv-parser
    language: Go
    input: |
      func p(f string) [][]string {
      	b, _ := os.ReadFile(f)
      	var r [][]string
      	for _, l := range strings.Split(string(b), "\n") {
      		if l == "" { continue }
      		var row []string
      		tmp := ""
      		q := false
      		for _, c := range l {
      			if c == '"' { q = !q; continue }
      			if c == ',' && !q { row = append(row, tmp); tmp = ""; continue }
      			tmp += string(c)
      		}
      		row = append(row, tmp)
      		r = append(r, row)
      	}
      	return r
      }
    expected_behavior: "Error handling, streaming reader, encoding/csv usage, proper quoting"

  - name: refactor-cache
    language: Go
    input: |
      var cache = map[string]interface{}{}
      var mu sync.Mutex
      func get(k string) interface{} {
      	mu.Lock()
      	defer mu.Unlock()
      	return cache[k]
      }
      func set(k string, v interface{}, ttl int) {
      	mu.Lock()
      	cache[k] = v
      	mu.Unlock()
      	go func() {
      		time.Sleep(time.Duration(ttl) * time.Second)
      		mu.Lock()
      		delete(cache, k)
      		mu.Unlock()
      	}()
      }
    expected_behavior: "Type-safe generics or typed cache, RWMutex, timer-based TTL without goroutine per entry"

