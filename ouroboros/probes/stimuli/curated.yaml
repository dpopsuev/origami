    expected_behavior: "Split-brain from network partition; old master recovered before clients switched"

  # === AMBIGUITY probes (4 stimuli) ===

  - name: ambiguity
    language: Go
    input: |
      === Feature Request ===
      Title: Add retry logic to the HTTP client

      Requirements from Product:
      - All HTTP requests must retry on failure (5xx status codes)
      - Maximum 3 retries with exponential backoff (1s, 2s, 4s)
      - Timeout per request: 500ms

      Requirements from SRE team:
      - Total request budget per operation: 2 seconds (hard limit, SLA-critical)
      - No retries on POST/PUT/DELETE (idempotency not guaranteed)
      - Circuit breaker: stop retrying after 3 consecutive failures across ALL requests

      Product wants 3 retries with backoff (1+2+4 = 7s minimum), but SRE caps total budget at 2s.
      Product wants retry on ALL requests, SRE excludes mutating methods.

      Write a Go implementation plan. Address the contradictions explicitly.
    expected_behavior: "Implementation plan explicitly addressing contradictions with justified resolutions"

  - name: ambiguity-caching
    input: |
      === Requirements ===
      From Product: "User profile data must always be fresh — never serve stale data."
      From Performance: "API response time must be under 50ms at p99."
      From Database team: "Profile queries take 200-500ms due to joins across 6 tables."

      Product says no caching. Performance says you need sub-50ms. Database says
      queries take 200-500ms. Design the data access layer.
    expected_behavior: "Identifies impossible triangle, proposes tiered caching with invalidation"

  - name: ambiguity-api-versioning
    input: |
      === API Migration Requirements ===
      - All clients must migrate to v2 API by March 1
      - v1 API must remain operational until all clients confirm migration
      - No client has confirmed migration readiness
      - v2 has breaking changes in authentication (OAuth2 replaces API keys)
      - Budget: 1 engineer, 2 weeks

      Design the migration plan.
    expected_behavior: "Identifies deadline vs dependency contradiction, proposes phased approach"

  - name: ambiguity-consistency
    input: |
      === Distributed System Requirements ===
      - Payment processing must be strongly consistent (no double charges)
      - System must remain available during network partitions (SLA: 99.99%)
      - Latency must stay under 100ms for all write operations
      - Single-region deployment (cost constraint)

      Design the payment system architecture.
    expected_behavior: "Identifies CAP theorem constraints, proposes compensating transactions"

