stimuli:
  # === REFACTOR probes (real-time game client) ===

  - name: refactor-globe-renderer
    language: TypeScript
    input: |
      // From a 3D globe renderer. This method is called on every
      // server tick to update tile colors and population indicators.
      // It accepts either full snapshots (Init) or lightweight deltas (Tick).

      updateTiles(
        deltas: TileDelta[] | TileSnapshot[],
        tilesCache?: Map<number, TileSnapshot>,
      ): void {
        let colorsDirty = false;
        let popDirty = false;
        const dirtyChunks = new Set<number>();

        for (const delta of deltas) {
          const full = tilesCache?.get(delta.id);
          const terrain: string = ('terrain' in delta ? delta.terrain : full?.terrain) ?? '';
          const position: Vec3 | undefined = ('position' in delta ? delta.position as Vec3 : full?.position as Vec3 | undefined);
          const elevation: number = ('elevation' in delta ? delta.elevation : full?.elevation) ?? 0;

          if (this.facetMode && this.chunks.length > 0) {
            const facetIds = this.tileFacetIds.get(delta.id);
            if (facetIds) {
              const ownerColor = getOwnerColor(delta.owner);
              for (const fid of facetIds) {
                const chunkIdx = this.facetIdToChunkIdx.get(fid);
                if (chunkIdx === undefined) continue;
                const chunk = this.chunks[chunkIdx];
                const localOffset = chunk.facetIdToLocalVertexOffset.get(fid);
                if (localOffset === undefined) continue;
                const colorAttr = chunk.fullMesh.geometry.getAttribute('color') as THREE.BufferAttribute;
                const vertCount = chunk.facetIdToVertexCount.get(fid) ?? GPU_VERTS_PER_FACET;
                const base = this.facetBaseColors.get(fid);
                if (!base) continue;
                for (let vi = 0; vi < vertCount; vi++) {
                  const ci = localOffset + vi;
                  if (ownerColor !== null) {
                    this._scratchA.setRGB(base[0], base[1], base[2]);
                    this._scratchA.lerp(this._scratchB.setHex(ownerColor), 0.3);
                    colorAttr.setXYZ(ci, this._scratchA.r, this._scratchA.g, this._scratchA.b);
                  } else {
                    colorAttr.setXYZ(ci, base[0], base[1], base[2]);
                  }
                }
                colorsDirty = true;
                dirtyChunks.add(chunkIdx);
              }
            }
          } else if (!this.facetMode) {
            const mesh = this.tileMeshes.get(delta.id);
            if (mesh) {
              const mat = mesh.material as THREE.MeshLambertMaterial;
              const baseColor = this.cfg.terrainColors[terrain] ?? 0x888888;
              const ownerColor = getOwnerColor(delta.owner);
              if (ownerColor !== null) {
                this._scratchA.setHex(baseColor).lerp(this._scratchB.setHex(ownerColor), 0.3);
                mat.color.copy(this._scratchA);
              } else {
                mat.color.setHex(baseColor);
              }
            }
          }

          if (this.popSystem && position) {
            const popIndex = this.tileToPopIndex.get(delta.id);
            if (popIndex !== undefined) {
              const totalPop = delta.pops.reduce((sum, g) => sum + g.count, 0);
              const ownerColor = getOwnerColor(delta.owner);
              this.popSystem.updateInstance(
                popIndex, totalPop, ownerColor,
                position, elevation, this.heightScale,
              );
              popDirty = true;
            }
          }
        }
      }
    expected_behavior: "Extracts facet-color update and tile-color update into separate methods, removes duplication of getOwnerColor calls, adds type guard for TileSnapshot vs TileDelta"

  # === DEBUG probes (game server and client) ===

  - name: debug-ws-lagged
    language: Rust
    input: |
      // WebSocket handler for a game server. Clients receive an Init snapshot
      // on connect, then Tick deltas via broadcast. The server uses tokio
      // broadcast channels.

      async fn handle_connection(
          stream: TcpStream,
          mut rx: broadcast::Receiver<Vec<u8>>,
          init_snapshot: Arc<Mutex<Option<Vec<u8>>>>,
          client_tx: ClientMessageSender,
      ) {
          let ws_stream = tokio_tungstenite::accept_async(stream).await?;
          let (mut ws_tx, mut ws_rx) = ws_stream.split();

          // Send the init snapshot if available.
          if let Some(bytes) = init_snapshot.lock().await.clone() {
              ws_tx.send(Message::Binary(bytes.into())).await?;
          }

          loop {
              tokio::select! {
                  msg = rx.recv() => {
                      match msg {
                          Ok(bytes) => {
                              if ws_tx.send(Message::Binary(bytes.into())).await.is_err() {
                                  break;
                              }
                          }
                          Err(broadcast::error::RecvError::Lagged(n)) => {
                              eprintln!("[ws] WARN: client lagged by {} messages", n);
                          }
                          Err(_) => break,
                      }
                  }
                  ws_msg = ws_rx.next() => {
                      match ws_msg {
                          Some(Ok(Message::Binary(bytes))) => {
                              match decode_client_message(&bytes) {
                                  Ok(client_msg) => {
                                      let _ = client_tx.send(client_msg);
                                  }
                                  Err(e) => {
                                      eprintln!("[ws] WARN: invalid client message: {}", e);
                                  }
                              }
                          }
                          Some(Ok(Message::Close(_))) | None => break,
                          _ => {}
                      }
                  }
              }
          }
      }

      // Context: the client renders a globe with 10k+ tiles. The Init message
      // contains the full state. Tick messages contain only changed tiles.
      // The server broadcasts Tick updates to all clients. broadcast::Receiver
      // has a fixed buffer; when a slow client falls behind, it receives
      // RecvError::Lagged(n) indicating n messages were dropped.

      What bugs or data integrity issues exist in this code? What happens to
      a slow client after it lags?
    expected_behavior: "Identifies that Lagged drops tick deltas leaving client with stale state, no re-init mechanism, silent data loss"

  - name: debug-plate-mend
    language: Rust
    input: |
      // From a procedural world generator. This code runs during the tectonic
      // phase to merge (mend) two continental plates that share a convergent
      // boundary with aligned drift vectors.

      // --- Phase 2b2: Plate mend (continental suturing) ---
      // When two continental plates share a convergent boundary with highly
      // aligned drift vectors (dot product > 0.7), merge them into one plate.
      // The former boundary retains high elevation as an interior mountain
      // range (suture zone), like the Urals or Appalachians. At most one
      // mend event per generation to prevent cascade-merging all plates.
      // Guard: skip for small worlds (< 500 tiles).
      if tile_count >= 500 {
          let mut mend_occurred = false;

          let mut best_pair: Option<(u8, u8, f32)> = None;
          for tile in tiles.iter() {
              if !mend_occurred {
                  if let Some(BoundaryType::Convergent) = tile.boundary_type {
                      let my_plate = tile.plate_id;
                      let my_plate_idx = my_plate as usize;
                      if my_plate_idx < plate_types.len()
                          && plate_types[my_plate_idx] == PlateType::Continental
                      {
                          for &nbr in &tile.neighbors {
                              let ni = nbr as usize;
                              if ni < tile_count {
                                  let other_plate = plate_ids[ni];
                                  let other_idx = other_plate as usize;
                                  if other_plate != my_plate
                                      && other_idx < plate_types.len()
                                      && plate_types[other_idx] == PlateType::Continental
                                      && my_plate_idx < plate_drift.len()
                                      && other_idx < plate_drift.len()
                                  {
                                      let dot = plate_drift[my_plate_idx][0]
                                          * plate_drift[other_idx][0]
                                          + plate_drift[my_plate_idx][1]
                                              * plate_drift[other_idx][1]
                                          + plate_drift[my_plate_idx][2]
                                              * plate_drift[other_idx][2];
                                      if dot > 0.7 {
                                          let (a, b) = if my_plate < other_plate {
                                              (my_plate, other_plate)
                                          } else {
                                              (other_plate, my_plate)
                                          };
                                          if let Some((_, _, best_dot)) = &best_pair {
                                              if dot > *best_dot {
                                                  best_pair = Some((a, b, dot));
                                              }
                                          } else {
                                              best_pair = Some((a, b, dot));
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }

          if let Some((plate_a, plate_b, _)) = best_pair {
              // ... mend execution: reassign plate_b tiles to plate_a ...
              mend_occurred = true;
          }
      }

      Review this code. Identify any bugs, logic issues, or violations of the
      stated invariants (comments). Explain what each issue would cause.
    expected_behavior: "Identifies mend_occurred is never set true BEFORE the loop, so the 'at most one mend' invariant within the scan loop is vacuous; spots the deep nesting as a code smell"

  - name: debug-tangent-singularity
    language: TypeScript
    input: |
      // Orders vertices around a center point on a unit sphere.
      // Used to build Voronoi cell boundaries for a polyhedron globe mesh.

      export function orderVerticesAroundCenter(center: Vec3, verts: Vec3[]): Vec3[] {
        if (verts.length <= 1) return verts;

        // The outward normal at the center is the center itself (unit sphere).
        const normal = normalize(center);

        // Build a tangent frame: pick an arbitrary vector not parallel to normal.
        let ref: Vec3 = [0, 1, 0];
        if (Math.abs(dot(normal, ref)) > 0.9) {
          ref = [1, 0, 0];
        }

        // tangentU = normalize(ref - (ref.normal) * normal)
        const d = dot(ref, normal);
        const tangentU = normalize([
          ref[0] - d * normal[0],
          ref[1] - d * normal[1],
          ref[2] - d * normal[2],
        ]);

        // tangentV = normal x tangentU
        const tangentV = cross(normal, tangentU);

        // Project each vertex offset onto the tangent plane and compute angle.
        const withAngles = verts.map((v) => {
          const dx = v[0] - center[0];
          const dy = v[1] - center[1];
          const dz = v[2] - center[2];
          const u = dx * tangentU[0] + dy * tangentU[1] + dz * tangentU[2];
          const w = dx * tangentV[0] + dy * tangentV[1] + dz * tangentV[2];
          return { v, angle: Math.atan2(w, u) };
        });

        withAngles.sort((a, b) => a.angle - b.angle);
        return withAngles.map((entry) => entry.v);
      }

      Identify edge cases, numerical issues, or degenerate inputs that could
      cause incorrect results or runtime errors. For each, explain the impact.
    expected_behavior: "Identifies zero-vector center causing NaN in normalize, singularity at poles where both ref vectors fail, vertices exactly at center producing (0,0) angles"

  - name: debug-crosslang-wire
    language: TypeScript
    input: |
      // === Rust server side (game-protocol crate) ===

      #[derive(Debug, Clone, PartialEq, Serialize, Deserialize)]
      pub enum ClientMessage {
          Pause,
          Resume,
          SetSpeed(f32),
          AdvanceTicks(u32),
      }

      pub fn encode_client_message(msg: &ClientMessage) -> Result<Vec<u8>, Box<dyn std::error::Error>> {
          let bytes = rmp_serde::to_vec(msg)?;
          Ok(bytes)
      }

      pub fn decode_client_message(bytes: &[u8]) -> Result<ClientMessage, Box<dyn std::error::Error>> {
          let msg = rmp_serde::from_slice(bytes)?;
          Ok(msg)
      }

      // === TypeScript client side (network.ts) ===

      import { encode } from '@msgpack/msgpack';

      export type ClientMessage =
        | 'Pause'
        | 'Resume'
        | { SetSpeed: number };

      export class NetworkClient {
        sendCommand(msg: ClientMessage): void {
          if (!this.ws || this.ws.readyState !== WebSocket.OPEN) return;
          const bytes = encode(msg);
          this.ws.send(bytes);
        }
      }

      // Usage in gameplay.ts:
      network.sendCommand('Pause');
      network.sendCommand('Resume');
      network.sendCommand({ SetSpeed: 2.0 });

      // Context: Rust uses serde's default externally-tagged enum format.
      // A unit variant like Pause serializes as {"Pause": null} in named mode,
      // or as a single-element map in compact mode.
      // The TypeScript @msgpack/msgpack encode() serializes a bare string
      // 'Pause' as a MessagePack string, not as a map.

      Analyze the cross-language protocol contract. Identify all wire-format
      mismatches, missing features, and silent failures. For each, explain what
      the user would observe.
    expected_behavior: "Identifies Pause/Resume string vs map mismatch, missing AdvanceTicks variant in TS, encode uses compact mode for Rust but TS sends named"

  # === PERSISTENCE probes (game simulation) ===

  - name: persistence-delta-compression
    language: Rust
    input: |
      // Delta compression for a game simulation. Each tick, only tiles whose
      // mutable state changed are sent to clients. Static fields (position,
      // elevation, terrain, neighbors) are sent once in the Init snapshot.

      pub fn build_tick_update(
          tick: u64,
          tiles: &Query<(&Tile, &WaterState, &FoodState, &TilePops, &Owner)>,
          previous: &mut PreviousSnapshot,
      ) -> TickUpdate {
          let mut changed_tiles: Vec<TileDelta> = Vec::new();

          for (tile, water, food, pops, owner) in tiles.iter() {
              let idx = tile.id as usize;

              if idx >= previous.tiles.len() {
                  previous.tiles.resize_with(idx + 1, || None);
              }

              let pops_hash = hash_pops(&pops.groups);

              let changed = match &previous.tiles[idx] {
                  None => true,
                  Some(prev) => {
                      prev.water_availability != water.availability
                          || prev.water_source != water.source_type
                          || prev.food_mode != food.mode
                          || prev.food_production != food.production
                          || prev.food_surplus != food.surplus
                          || prev.owner != owner.people_id
                          || prev.pops_hash != pops_hash
                  }
              };

              if changed {
                  changed_tiles.push(TileDelta {
                      id: tile.id,
                      water_availability: water.availability,
                      water_source: water.source_type,
                      food_mode: food.mode,
                      food_production: food.production,
                      food_surplus: food.surplus,
                      pops: pops.groups.iter().map(|g| PopGroupSnapshot {
                          ethnos_id: g.ethnos_id,
                          pop_type: g.pop_type,
                          count: g.count,
                      }).collect(),
                      owner: owner.people_id,
                  });

                  previous.tiles[idx] = Some(TileMutableState {
                      water_availability: water.availability,
                      water_source: water.source_type,
                      water_salinity: water.salinity,
                      food_mode: food.mode,
                      food_production: food.production,
                      food_surplus: food.surplus,
                      pops_hash,
                      owner: owner.people_id,
                  });
              }
          }

          let tile_count = tiles.iter().count();
          if changed_tiles.len() > tile_count {
              eprintln!("[snapshot] WARN: more deltas than tiles at tick {}", tick);
          }

          TickUpdate { tick, changed_tiles }
      }

      // New requirement: add a `soil_fertility: f32` field to TileDelta.
      // The simulation now has a SoilState component with a `fertility` field.
      // Extend this function to include soil_fertility in the delta and the
      // change-detection logic. Also identify any existing bugs or issues
      // in the current implementation.

      Implement the extension and identify issues.
    expected_behavior: "Adds soil_fertility to TileDelta, TileMutableState, and change detection; identifies f32 equality comparison issue, the impossible 'more deltas than tiles' check, and water_salinity tracked in cache but not in delta"

  # === GBWP probes (cross-language reasoning) ===

  - name: gbwp-protocol-contract
    language: Rust
    input: |
      === Protocol Contract Scenario ===

      A game uses Rust (serde + rmp-serde) for the server and TypeScript
      (@msgpack/msgpack) for the client. The protocol defines:

      CLAIM: "The ClientMessage Pause/Resume commands work correctly because
      both sides use MessagePack encoding and the TypeScript type definition
      mirrors the Rust enum."

      EVIDENCE:
      1. Rust enum: `enum ClientMessage { Pause, Resume, SetSpeed(f32), AdvanceTicks(u32) }`
      2. Rust uses `rmp_serde::to_vec` (compact, integer keys) for encoding
      3. TypeScript type: `type ClientMessage = 'Pause' | 'Resume' | { SetSpeed: number }`
      4. TypeScript uses `encode('Pause')` which produces a MessagePack string
      5. Rust `rmp_serde::from_slice` expects externally-tagged enum format
      6. Server logs show: "[ws] WARN: invalid client message: ..." whenever
         Pause or Resume is sent
      7. SetSpeed works correctly because it's sent as `{ SetSpeed: 2.0 }`
      8. Contract tests exist in Rust for ServerMessage but not for ClientMessage

      KNOWN VERDICT: INCORRECT. The Pause/Resume commands silently fail.
      Confidence should be HIGH (>= 0.85).

      Provide VERDICT, CONFIDENCE, and JUSTIFICATION citing specific evidence.
    expected_behavior: "Incorrect verdict with high confidence, citing evidence 4-7 showing string vs map encoding mismatch"
