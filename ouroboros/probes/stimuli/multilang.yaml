  - name: persistence-python
    language: Python
    input: |
      === Task: Implement a data pipeline ===
      Write a Python data pipeline that:
      1. Reads CSV files from a directory (glob pattern)
      2. Validates each row against a schema (required fields, types)
      3. Transforms: normalize dates to ISO-8601, strip whitespace, deduplicate
      4. Outputs: JSON Lines format with a summary report

      Edge cases:
      - Mixed encodings (UTF-8, Latin-1)
      - Malformed CSV rows (wrong column count)
      - Dates in multiple formats ("2024-01-15", "01/15/2024", "Jan 15, 2024")
      - Duplicate rows by primary key

      CONSTRAINT: standard library only (no pandas).
      Implement: def process_pipeline(input_dir: str, schema: dict, output_path: str) -> dict
    expected_behavior: "Complete pipeline with encoding detection, date normalization, dedup"

  # === Rust variants ===

  - name: refactor-rust
    language: Rust
    input: |
      fn d(a: &[i32], b: &str, c: bool) -> Result<(i32, String), String> {
          let mut r = 0;
          let mut s = String::new();
          for i in 0..a.len() {
              if a[i] > 0 {
                  r = r + a[i];
                  if c {
                      s = s + &format!("{},", a[i]);
                  }
              } else if a[i] < 0 {
                  r = r - a[i];
                  if c {
                      s = s + &format!("({}),", a[i]);
                  }
              }
          }
          if r == 0 {
              return Err(format!("empty result for {}", b));
          }
          if !b.is_empty() {
              s = format!("{}: {}", b, s);
          }
          Ok((r, s))
      }
    expected_behavior: "Idiomatic Rust with iterators, proper error types, no unnecessary clones"

  - name: debug-rust
    language: Rust
    input: |
      === tokio runtime logs ===
      14:00:00 TRACE tokio::runtime: spawning task count=1547 (baseline: ~50)
      14:00:01 WARN  hyper::server: connection keep-alive timeout after 60s
      14:00:02 ERROR tower::timeout: request timed out after 30s
      14:00:03 TRACE tokio::runtime: spawning task count=1823
      14:00:05 ERROR sqlx::pool: timed out waiting for connection (pool exhausted)
      14:00:06 WARN  reqwest: connection to redis:6379 refused
      14:00:08 ERROR tower::timeout: request timed out after 30s
      14:00:10 TRACE tokio::runtime: spawning task count=2341
      14:00:12 ERROR panic in task: "called `Result::unwrap()` on an `Err` value"

      === Deployment ===
      13:45:00 Deployed: "Added .await to database query in hot path"
      13:50:00 Feature flag enabled: concurrent-request-batching

      What is the root cause?
    expected_behavior: "Unbounded task spawning from concurrent batching, not the .await change"

  # === TypeScript variants ===

  - name: refactor-typescript
    language: TypeScript
    input: |
      function d(a: number[], b: string, c: boolean): [number, string] | Error {
        let r = 0;
        let s = "";
        for (let i = 0; i < a.length; i++) {
          if (a[i] > 0) {
            r = r + a[i];
            if (c) { s = s + a[i] + ","; }
          } else if (a[i] < 0) {
            r = r - a[i];
            if (c) { s = s + "(" + a[i] + "),"; }
          }
        }
        if (r === 0) { return new Error("empty result for " + b); }
        if (b) { s = b + ": " + s; }
        return [r, s];
      }
    expected_behavior: "TypeScript with proper types, Result pattern, reduce/filter, JSDoc"

  - name: debug-typescript
    language: TypeScript
    input: |
      === Next.js application logs ===
      10:30:00 [warn] Memory usage: 1.8GB / 2GB (Node.js heap)
      10:30:01 [error] FATAL ERROR: Reached heap limit Allocation failed
      10:30:02 [info] Server restarted (PM2 auto-restart #47)
      10:30:05 [warn] Memory usage: 800MB (post-restart baseline: 200MB)
      10:30:10 [info] SSR cache size: 15,000 entries (no eviction policy)
      10:30:15 [warn] Memory usage: 1.2GB
      10:30:20 [info] getServerSideProps called 500 times/min (expected: 50/min)

      === Recent changes ===
      10:00:00 Deployed: removed ISR (Incremental Static Regeneration) in favor of SSR
      10:15:00 Marketing campaign started (10x traffic)

      What is the root cause?
    expected_behavior: "SSR without caching eviction under 10x traffic, not a memory leak"

  - name: persistence-typescript
    language: TypeScript
    input: |
      === Task: Implement a form validation library ===
      Create a TypeScript form validation library that:
      1. Validates fields by type (string, number, email, date, custom regex)
      2. Supports nested objects and arrays
      3. Returns typed error objects with field paths
      4. Supports async validators (e.g., "is email unique?")
      5. Composes validators (required AND email AND maxLength)

      Edge cases:
      - Circular references in nested objects
      - Async validators that timeout
      - Partial validation (validate only changed fields)
      - i18n error messages

      Implement with full TypeScript types (no `any`).
    expected_behavior: "Type-safe validation with generics, async support, proper error accumulation"
