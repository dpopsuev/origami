stimuli:
  # === Python variants ===

  - name: refactor-python
    language: Python
    input: |
      def d(a, b, c):
          r = 0
          s = ""
          for i in range(len(a)):
              if a[i] > 0:
                  r = r + a[i]
                  if c:
                      s = s + str(a[i]) + ","
              elif a[i] < 0:
                  r = r - a[i]
                  if c:
                      s = s + "(" + str(a[i]) + "),"
          if r == 0:
              raise ValueError(f"empty result for {b}")
          if b:
              s = b + ": " + s
          return r, s
    expected_behavior: "Refactored Python with type hints, docstrings, list comprehensions"

  - name: debug-python
    language: Python
    input: |
      === Flask application logs ===
      10:15:00 WARNING  sqlalchemy.pool: Connection pool size exceeded (pool_size=5, overflow=10)
      10:15:01 ERROR    werkzeug: 500 Internal Server Error on /api/users
      10:15:02 INFO     sqlalchemy.engine: SELECT users.id FROM users WHERE users.email = ?
      10:15:03 WARNING  flask: Session cookie too large (4.2KB, limit 4KB)
      10:15:05 ERROR    sqlalchemy.pool: QueuePool limit of size 5 overflow 10 reached
      10:15:06 ERROR    werkzeug: 500 Internal Server Error on /api/orders
