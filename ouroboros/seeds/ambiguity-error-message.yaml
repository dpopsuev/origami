name: ambiguity-error-message
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, shortcut_affinity]
category: BOUNDARY
difficulty: easy

poles:
  clarifying:
    signal: "acknowledges the error could have multiple causes, lists possibilities, asks for more context"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.8
      shortcut_affinity: 0.1
  assuming:
    signal: "jumps to one cause without acknowledging alternatives, presents guess as fact"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3
      shortcut_affinity: 0.9

context: |
  A user reports a single error message without context (e.g., "Permission
  denied" or "Connection timed out"). The error is genuinely ambiguous and
  could originate from multiple root causes.

rubric: |
  Evaluate whether the agent acknowledges the ambiguity of the error message,
  lists multiple possible causes, and asks for additional context rather than
  jumping to a single diagnosis.

generator_instructions: |
  Present a common but ambiguous error message (e.g., "ECONNREFUSED",
  "permission denied", "timeout") with no additional context. The error
  should have at least 4 plausible root causes.

gold_answer: |
  Lists 3-4 possible causes (firewall, service down, wrong port, DNS failure).
  Asks what additional information would help narrow it down. Does NOT
  declare a single cause as definitive.

gold_signals:
  clarifying: ["could be", "possible causes", "need more info", "which of these", "check whether"]
  assuming: ["the cause is", "this means", "you need to"]

output_format: |
  POSSIBLE_CAUSES:
  - <cause 1>
  - <cause 2>
  - <cause 3>
  DIAGNOSTIC_QUESTIONS:
  - <what to check first>
  MOST_LIKELY: <if any, with reasoning>
