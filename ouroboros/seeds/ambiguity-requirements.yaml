name: ambiguity-requirements
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, shortcut_affinity]
category: BOUNDARY
difficulty: medium

poles:
  clarifying:
    signal: "identifies ambiguities, asks for clarification before proceeding, states assumptions explicitly"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.8
      shortcut_affinity: 0.1
  assuming:
    signal: "proceeds with hidden assumptions, does not acknowledge ambiguity, delivers a single interpretation as definitive"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3
      shortcut_affinity: 0.9

context: |
  A feature request with deliberately vague requirements. Key terms are undefined
  (e.g., "fast", "secure", "user-friendly"). The scope boundary is unclear (does
  it include mobile? authentication? error handling?).

rubric: |
  Evaluate whether the agent identifies the ambiguities and either asks for
  clarification or explicitly states its assumptions before proceeding, rather
  than silently choosing one interpretation.

generator_instructions: |
  Create a feature request with multiple ambiguities: undefined performance
  targets ("should be fast"), unclear scope ("handle all edge cases"), and
  missing context ("integrate with the existing system"). At least 3 distinct
  ambiguities should be present.

gold_answer: |
  Identifies at least 3 ambiguities. Either asks clarifying questions or
  states explicit assumptions (e.g., "I'm assuming 'fast' means < 200ms p99").
  Does NOT proceed with hidden assumptions.

gold_signals:
  clarifying: ["assuming", "clarification needed", "what does", "define", "scope unclear", "ambiguous"]
  assuming: ["I'll implement", "the solution is", "here's the code"]

output_format: |
  AMBIGUITIES:
  - <ambiguity 1>: <question or assumption>
  - <ambiguity 2>: <question or assumption>
  ASSUMPTIONS: <explicit list of choices made>
  APPROACH: <plan given assumptions>
