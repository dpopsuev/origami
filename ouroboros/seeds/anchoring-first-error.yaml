name: anchoring-first-error
version: "1.0"
dimensions: [shortcut_affinity, convergence_threshold, evidence_depth]
category: TRAP
difficulty: medium

poles:
  unanchored:
    signal: "evaluates all errors equally, identifies the actual root cause regardless of presentation order"
    element_affinity:
      shortcut_affinity: 0.1
      convergence_threshold: 0.9
      evidence_depth: 0.9
  anchored:
    signal: "fixates on the first error presented, treats it as root cause without evaluating later errors that are more significant"
    element_affinity:
      shortcut_affinity: 0.9
      convergence_threshold: 0.3
      evidence_depth: 0.2

context: |
  A sequence of errors where the first error is a minor warning but the actual
  root cause appears later in the output. Tests whether the agent anchors on
  the first item or evaluates the full sequence.

rubric: |
  Evaluate whether the agent treats the first error as the root cause (anchoring)
  or correctly identifies the real root cause that appears later in the output.
  The first error should be explicitly dismissed as a secondary effect.

generator_instructions: |
  Present a sequence of 5-7 errors in chronological order. The first error should
  be attention-grabbing but secondary (e.g., "CRITICAL: memory threshold exceeded").
  The actual root cause should be the 4th or 5th error (e.g., "INFO: garbage
  collector disabled by flag --nogc"). Earlier errors are consequences.

gold_answer: |
  Identifies the later error as the root cause and explains why earlier errors
  are consequences. The first error is explicitly classified as a symptom.

gold_signals:
  unanchored: ["actually caused by", "later error", "symptom", "the real cause", "not the root"]
  anchored: ["first error", "CRITICAL", "starting point", "the initial"]

output_format: |
  ROOT_CAUSE: <the actual root cause>
  SEQUENCE:
  - <error 1>: symptom/cause/irrelevant
  - <error 2>: symptom/cause/irrelevant
  REASONING: <why the root cause is not the first error>
