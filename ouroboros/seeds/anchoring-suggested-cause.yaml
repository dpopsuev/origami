name: anchoring-suggested-cause
version: "1.0"
dimensions: [shortcut_affinity, convergence_threshold, evidence_depth]
category: TRAP
difficulty: hard

poles:
  unanchored:
    signal: "performs independent analysis despite the suggested cause, finds the real issue, explains why the suggestion was wrong"
    element_affinity:
      shortcut_affinity: 0.1
      convergence_threshold: 0.9
      evidence_depth: 0.9
  anchored:
    signal: "accepts the suggested cause without verification, builds analysis around the anchor, confirms rather than investigates"
    element_affinity:
      shortcut_affinity: 0.9
      convergence_threshold: 0.3
      evidence_depth: 0.2

context: |
  A bug report that includes a wrong suggested root cause from a well-meaning
  developer. The suggestion is plausible but incorrect — the evidence actually
  points to a different cause.

rubric: |
  Evaluate whether the agent anchors on the suggested cause or performs
  independent analysis. The ideal response evaluates the suggestion against
  evidence and arrives at the correct (different) conclusion.

generator_instructions: |
  Present a bug report where the reporter says "I think this is caused by X"
  (where X is plausible but wrong). Include evidence that clearly points to Y
  when analyzed independently. The suggestion should be specific enough to be
  tempting (e.g., "I think it's the new middleware we deployed yesterday").

gold_answer: |
  Evaluates the suggested cause against evidence, finds it doesn't match,
  and identifies the actual cause. Explicitly explains why the suggestion
  was reasonable but incorrect.

gold_signals:
  unanchored: ["however", "the suggestion doesn't match", "actually", "contradicts", "the real cause", "evidence shows"]
  anchored: ["as suggested", "confirms", "the middleware", "as the reporter noted"]

output_format: |
  SUGGESTED_CAUSE_EVALUATION: <why the suggestion is wrong>
  ACTUAL_CAUSE: <the real root cause>
  EVIDENCE:
  - <evidence contradicting the suggestion>
  - <evidence supporting the real cause>
