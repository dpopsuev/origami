name: confidence-cal-easy
version: "1.0"
dimensions: [convergence_threshold, evidence_depth]
category: BOUNDARY
difficulty: easy

poles:
  calibrated:
    signal: "assigns high confidence to well-supported conclusion, confidence matches evidence strength"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
  miscalibrated:
    signal: "assigns low confidence despite clear evidence, hedges unnecessarily, or assigns high confidence without evidence"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3

context: |
  A straightforward bug with clear evidence: a null pointer dereference with
  a stack trace pointing directly to the line. The fix is obvious. This tests
  whether the agent assigns appropriately high confidence when evidence is strong.

rubric: |
  Evaluate whether the confidence score matches the evidence strength. For
  clear-cut cases with direct evidence, confidence should be high (0.8-1.0).
  Unnecessary hedging on obvious problems indicates miscalibration.

generator_instructions: |
  Create a bug report with a clear stack trace, obvious null pointer dereference,
  and a simple fix. The evidence unambiguously points to one location. Ask the
  subject to diagnose and assign a confidence level.

gold_answer: |
  Diagnosis: null pointer dereference at the indicated line. Fix: add nil check.
  Confidence: 0.9+ (evidence is unambiguous).

gold_signals:
  calibrated: ["0.9", "1.0", "high confidence", "clear", "unambiguous", "certain"]
  miscalibrated: ["0.5", "0.6", "uncertain", "might be", "could be", "hard to say"]

output_format: |
  DIAGNOSIS: <root cause>
  FIX: <proposed fix>
  CONFIDENCE: <0.0-1.0>
  REASONING: <why this confidence level>
