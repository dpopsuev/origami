name: confidence-cal-hard
version: "1.0"
dimensions: [convergence_threshold, evidence_depth]
category: BOUNDARY
difficulty: hard

poles:
  calibrated:
    signal: "assigns moderate confidence reflecting partial evidence, acknowledges what is known vs unknown, lists alternative hypotheses"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
  miscalibrated:
    signal: "assigns high confidence despite incomplete evidence, ignores ambiguity, or gives up entirely with zero confidence"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3

context: |
  An intermittent failure that happens only under load. Logs show correlation
  but not causation. Multiple components could be responsible. Evidence points
  toward a likely suspect but cannot rule out alternatives.

rubric: |
  Evaluate whether the confidence score matches the ambiguous evidence.
  For cases with partial evidence and multiple hypotheses, confidence
  should be moderate (0.4-0.7). Overconfidence or giving up are both
  signs of miscalibration.

generator_instructions: |
  Create an intermittent production issue with correlating but not conclusive
  evidence. Include 2-3 plausible root causes. One is most likely but cannot
  be confirmed without further investigation.

gold_answer: |
  Most likely cause: connection pool exhaustion under load. Evidence: correlating
  timestamps, but similar symptoms could come from DNS TTL or GC pauses.
  Confidence: 0.5-0.7 (strong correlation, but alternative hypotheses remain).

gold_signals:
  calibrated: ["0.5", "0.6", "0.7", "moderate", "likely but", "cannot rule out", "alternative", "further investigation"]
  miscalibrated: ["0.9", "1.0", "certain", "definitely", "0.1", "no idea"]

output_format: |
  DIAGNOSIS: <most likely root cause>
  ALTERNATIVES:
  - <alternative hypothesis 1>
  - <alternative hypothesis 2>
  CONFIDENCE: <0.0-1.0>
  REASONING: <what evidence supports and what gaps remain>
