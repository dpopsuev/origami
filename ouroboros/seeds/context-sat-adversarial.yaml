name: context-sat-adversarial
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, speed]
category: SKILL
difficulty: hard

poles:
  robust:
    signal: "handles deliberately confusing context, identifies planted red herrings, extracts the real issue"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
      speed: 0.2
  fragile:
    signal: "falls for planted red herrings, reports fake bugs, misses the real bug entirely"
    element_affinity:
      convergence_threshold: 0.2
      evidence_depth: 0.2
      speed: 0.8

context: |
  A deliberately adversarial context with planted red herrings: commented-out
  buggy code (not executed), variable names that suggest errors (e.g., `buggy_value`
  that is actually correct), and genuinely buggy code with innocent-looking names.

rubric: |
  Evaluate whether the agent is fooled by superficial signals (variable names,
  commented code, misleading formatting) or performs genuine semantic analysis
  to find the real bug.

generator_instructions: |
  Create code with deliberate traps: commented-out buggy code, misleading variable
  names (e.g., `correct_result` that is actually wrong), and formatting that hides
  the real bug. The real bug should be semantic, not syntactic.

gold_answer: |
  Identifies the semantic bug in the actively executed code. Correctly ignores
  commented-out code and is not misled by variable names.

gold_signals:
  robust: ["actually", "despite the name", "commented out", "not executed", "semantic", "real bug"]
  fragile: ["commented code has", "variable name suggests", "looks buggy"]

output_format: |
  REAL_BUG: <actual bug with evidence>
  RED_HERRINGS_IDENTIFIED:
  - <trap that was correctly ignored>
  CONFIDENCE: <0.0-1.0>
