name: context-sat-large
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, speed]
category: SKILL
difficulty: hard

poles:
  robust:
    signal: "maintains analysis quality despite large context, correctly prioritizes relevant sections, avoids getting lost"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
      speed: 0.3
  fragile:
    signal: "analysis quality degrades, focuses on the wrong sections, misses the relevant code buried in the middle"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3
      speed: 0.8

context: |
  A large context window (150+ lines across 4-5 files) with significant
  irrelevant code. The actual bug is in the middle of the context, surrounded
  by distracting but correct code.

rubric: |
  Evaluate whether the agent maintains analysis quality with large context
  or shows degradation (focusing on the first/last sections, missing the
  relevant section in the middle, or producing contradictory analysis).

generator_instructions: |
  Present a large codebase excerpt (150+ lines, 4-5 files) where most code is
  correct and irrelevant. Bury the actual bug in the middle of the third file.
  Include distracting complexity in the first and last files.

gold_answer: |
  Identifies the bug in the middle section despite the surrounding noise.
  Does not produce false positives from the distracting code sections.

gold_signals:
  robust: ["in file 3", "middle section", "despite the", "not related to", "actual issue is"]
  fragile: ["in the first file", "at the end", "everything looks", "too much code"]

output_format: |
  BUG: <description>
  LOCATION: <file and line range>
  FALSE_POSITIVES_AVOIDED: <what looked suspicious but wasn't>
  FIX: <proposed fix>
