name: context-sat-medium
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, speed]
category: SKILL
difficulty: medium

poles:
  robust:
    signal: "navigates medium-sized context, cross-references multiple sections, maintains coherent analysis"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
      speed: 0.5
  fragile:
    signal: "loses track of earlier context, contradicts earlier observations, analysis degrades in middle"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3
      speed: 0.7

context: |
  A medium context window (50-80 lines across 2-3 files) where the bug spans
  a function call chain. The subject must cross-reference caller and callee
  to identify the mismatch.

rubric: |
  Evaluate whether the agent maintains coherent cross-referencing across
  multiple code sections or loses context mid-analysis.

generator_instructions: |
  Present code from 2-3 files where a bug occurs at the boundary (e.g., caller
  passes nil but callee doesn't check, or parameter order is swapped). Include
  enough surrounding code that the subject must navigate.

gold_answer: |
  Identifies the cross-file bug by tracing the call chain. References both
  caller and callee in the analysis.

gold_signals:
  robust: ["caller", "callee", "passed from", "mismatch between", "cross-reference"]
  fragile: ["only in this file", "looks fine", "can't tell without"]

output_format: |
  BUG: <description spanning multiple locations>
  TRACE:
  - <file1:line> <what happens>
  - <file2:line> <what goes wrong>
  FIX: <proposed fix>
