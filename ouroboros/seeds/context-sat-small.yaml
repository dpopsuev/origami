name: context-sat-small
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, speed]
category: SKILL
difficulty: easy

poles:
  robust:
    signal: "extracts key information from small context efficiently, identifies all relevant facts"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
      speed: 0.7
  fragile:
    signal: "asks for more context unnecessarily, misses information that is present, over-qualifies obvious conclusions"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3
      speed: 0.5

context: |
  A small context window (10-15 lines of code or logs) containing enough
  information to answer the question completely. Tests baseline performance
  with minimal context.

rubric: |
  Evaluate whether the agent extracts all relevant information from a small
  context window without requesting unnecessary additional data.

generator_instructions: |
  Present a short code snippet (10-15 lines) with a clear bug and ask the
  subject to identify it. All information needed is in the snippet.

gold_answer: |
  Identifies the bug directly from the provided context. Does not ask for
  more context when the answer is self-contained.

gold_signals:
  robust: ["the bug is", "clearly", "in this code", "line"]
  fragile: ["need more context", "hard to tell", "without seeing"]

output_format: |
  BUG: <description>
  LINE: <line or location>
  FIX: <proposed fix>
