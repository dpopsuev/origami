name: debug-crosslang-wire
version: "1.0"
dimensions: [evidence_depth, gbwp, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  methodical:
    signal: "identifies string vs map encoding mismatch, missing AdvanceTicks, compact vs named mode difference, silent failure pattern"
    element_affinity:
      evidence_depth: 0.9
      gbwp: 0.9
      convergence_threshold: 0.9
  reactive:
    signal: "says types look aligned, focuses on naming differences, misses the encoding mismatch"
    element_affinity:
      evidence_depth: 0.2
      gbwp: 0.2
      convergence_threshold: 0.3

context: |
  Cross-language protocol between a Rust game server (serde + rmp-serde) and
  a TypeScript client (msgpack). The protocol defines ClientMessage as a Rust
  enum with unit variants (Pause, Resume) and data variants (SetSpeed,
  AdvanceTicks). The TypeScript side mirrors this as a union type but encodes
  unit variants as bare strings instead of the externally-tagged map format
  that Rust serde expects. Real production code where the mismatch causes
  Pause/Resume to silently fail.

rubric: |
  Evaluate whether the response traces the complete encoding/decoding path
  for each variant (what bytes TS produces vs what Rust expects), identifies
  all wire-format mismatches, and explains the user-visible symptoms -- or
  whether it does a shallow type comparison that misses the encoding-level
  divergence.

generator_instructions: |
  Present both the Rust ClientMessage enum with encode/decode functions and
  the TypeScript ClientMessage type with sendCommand implementation. Include
  the usage examples. Ask the subject to analyze the cross-language protocol.

gold_answer: |
  Mismatch 1 (Critical): TypeScript sends Pause as a MessagePack string.
  Rust serde expects an externally-tagged enum: a map with key Pause and
  value null. The server decode_client_message fails and logs a warning.
  User sees: Pause/Resume buttons do nothing. Fix: send { Pause: null }.
  Mismatch 2 (Feature gap): AdvanceTicks(u32) exists in Rust but not in the
  TypeScript type. The client cannot send advance commands.
  Mismatch 3 (Encoding mode): Rust encode_client_message uses to_vec
  (compact mode, integer keys) while ServerMessage uses to_vec_named. If
  the server ever echoes a ClientMessage, compact mode would break TS decode.

gold_signals:
  methodical: ["string", "map", "externally-tagged", "null", "silently fail", "AdvanceTicks", "missing", "compact", "named"]
  reactive: ["types match", "looks correct", "naming", "convention"]

output_format: |
  MISMATCHES:
  - <mismatch description with encoding details>
  IMPACT:
  - <user-visible behavior for each mismatch>
  FIXES:
  - <proposed fix for each mismatch>
  MISSING_COVERAGE:
  - <what contract tests should exist>
