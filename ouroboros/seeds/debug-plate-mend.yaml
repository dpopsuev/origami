name: debug-plate-mend
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  methodical:
    signal: "identifies the mend_occurred bug, explains why the guard is vacuous, spots the deep nesting, and proposes a fix"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "says the code looks correct, focuses on minor style issues, misses the mend_occurred bug"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Procedural world generation for a globe-based civilization game. During the
  tectonic phase, continental plates with aligned drift vectors at convergent
  boundaries can merge (mend). The code comments state "at most one mend event
  per generation to prevent cascade-merging." The code declares mend_occurred
  but has a logic error in how it's used. Real production Rust code with 7
  levels of nesting and a subtle invariant violation.

rubric: |
  Evaluate whether the response performs systematic code review (tracing
  variable lifecycle, checking invariants against comments, identifying
  unreachable code or dead variables) or does a surface-level scan that
  misses the core bug.

generator_instructions: |
  Present the Phase 2b2 plate mend code from geological.rs verbatim.
  Ask the subject to review the code, identify bugs or logic issues,
  and explain what each issue would cause in the world generation output.
  The key bug: mend_occurred is never set to true BEFORE the search loop,
  so the `if !mend_occurred` guard never triggers — the scan always runs
  to completion. The comment says "at most one mend" but the code does
  not enforce it during the search (only one mend executes because
  best_pair picks the best, but the intent was to short-circuit scanning).

gold_answer: |
  Bug: mend_occurred is declared false and checked in the loop, but is only
  set to true AFTER the loop (in the `if let Some(best_pair)` block). The
  guard `if !mend_occurred` inside the loop always evaluates to true, making
  it dead code. The stated invariant "at most one mend per generation" is
  technically preserved by the best_pair selection pattern (only one pair
  executes), but the early-exit optimization is broken. Fix: either remove
  the dead guard or restructure to break after finding the first candidate
  above the threshold. Additional issue: 7 levels of nesting make the code
  hard to reason about — extract the neighbor-scanning into a helper function.

gold_signals:
  methodical: ["mend_occurred", "never set", "dead code", "invariant", "always true", "guard", "nesting", "extract", "helper"]
  reactive: ["looks correct", "style", "naming", "formatting"]

output_format: |
  BUGS:
  - <bug description with line reference>
  IMPACT:
  - <what each bug causes in the simulation>
  FIXES:
  - <proposed fix>
  CODE_SMELLS:
  - <structural issues>
