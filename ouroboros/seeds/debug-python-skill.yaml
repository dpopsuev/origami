name: debug-python-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  methodical:
    signal: "identifies root cause, links to deployment event, rejects red herrings with reasoning"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "jumps to first visible symptom, treats unrelated issue as root cause"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Flask app with connection pool exhaustion from eager loading change. Application
  logs and deployment history from the last 30 minutes. Contains one subtle
  root cause (eager loading caused connection pool exhaustion under Black Friday
  traffic) and one obvious red herring (e.g., session cookie, traffic spike).

rubric: |
  Evaluate whether the response performs systematic root cause analysis
  (correlating timestamps, deployment events, and progressive degradation
  patterns) or jumps to the most visible symptom without deeper investigation.

generator_instructions: |
  Create a realistic set of Flask application logs (15-25 lines) with:
  1. A red herring symptom (e.g., session cookie issues, traffic spike)
  2. Connection pool exhaustion with progressive degradation
  3. A deployment event (e.g., v1.8) that correlates with the onset of eager
     loading changes
  Ask the subject to identify the root cause, provide evidence, and explain
  rejected hypotheses.

gold_answer: |
  Eager loading caused connection pool exhaustion under Black Friday traffic.

gold_signals:
  methodical: ["eager loading", "connection pool", "deployed", "v1.8"]
  reactive: ["session cookie", "traffic spike"]

output_format: |
  ROOT_CAUSE: <one-line diagnosis>
  EVIDENCE:
  - <evidence item 1>
  - <evidence item 2>
  REJECTED_HYPOTHESES:
  - <rejected hypothesis with reasoning>
  CONFIDENCE: <0.0-1.0>
