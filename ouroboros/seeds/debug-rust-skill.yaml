name: debug-rust-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  methodical:
    signal: "identifies root cause, links to feature flag, rejects red herrings with reasoning"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "jumps to first visible symptom, treats unrelated issue as root cause"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Tokio runtime with unbounded task spawning from concurrent batching. Application
  logs and deployment history. Contains one subtle root cause (concurrent
  batching feature flag caused unbounded task spawning) and one obvious red
  herring (e.g., unwrap panic, redis connection refused).

rubric: |
  Evaluate whether the response performs systematic root cause analysis
  (correlating feature flags, task spawning patterns, and progressive
  degradation) or jumps to the most visible symptom without deeper
  investigation.

generator_instructions: |
  Create a realistic set of Tokio/Rust application logs (15-25 lines) with:
  1. A red herring symptom (e.g., unwrap panic, redis connection refused)
  2. Unbounded task spawning with progressive degradation
  3. A feature flag (concurrent-batching) that correlates with the onset
  Ask the subject to identify the root cause, provide evidence, and explain
  rejected hypotheses.

gold_answer: |
  Concurrent batching feature flag caused unbounded task spawning.

gold_signals:
  methodical: ["task spawning", "unbounded", "concurrent-batching", "feature flag"]
  reactive: ["unwrap", "redis", "connection refused"]

output_format: |
  ROOT_CAUSE: <one-line diagnosis>
  EVIDENCE:
  - <evidence item 1>
  - <evidence item 2>
  REJECTED_HYPOTHESES:
  - <rejected hypothesis with reasoning>
  CONFIDENCE: <0.0-1.0>
