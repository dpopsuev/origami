name: debug-skill-scaffolded
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL
difficulty: medium

hints:
  - "Check if there is a correlation between the deployment timestamp and the error onset."
  - "Look at resource metrics that change linearly over time, not just absolute values."
  - "Consider whether the obvious symptom is actually a red herring — does it correlate with the timeline?"

poles:
  methodical:
    signal: "identifies root cause, links to deployment event, rejects red herrings with reasoning"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "jumps to first visible symptom, treats memory warning as root cause, skips deployment correlation"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Application logs from the last 30 minutes showing warnings, errors, and deployment
  history. Contains one subtle root cause and one obvious red herring.
  Progressive hints guide the subject toward systematic analysis.

rubric: |
  Evaluate whether the response performs systematic root cause analysis (correlating
  timestamps, deployment events, and progressive degradation patterns) or jumps to
  the most visible symptom, and how many hints were needed to reach the correct answer.

generator_instructions: |
  Create a realistic set of application logs (15-25 lines) with:
  1. A red herring symptom (visible but not the root cause)
  2. A subtle root cause with progressive degradation
  3. A deployment event that correlates with the onset
  Ask the subject to identify the root cause, provide evidence, and explain rejected hypotheses.

gold_answer: |
  Root cause: goroutine leak from unclosed channel in async notification handler.
  Evidence: deployment v2.14 at 14:23 correlates with error onset at 14:25.
  Goroutine count rises linearly post-deploy while request latency increases.
  Red herring: memory at 78% is within normal operating range.

gold_signals:
  methodical: ["root cause", "deployment", "correlat", "red herring", "goroutine", "progressive"]
  reactive: ["memory", "OOM", "restart", "high memory"]

output_format: |
  ROOT_CAUSE: <one-line diagnosis>
  EVIDENCE:
  - <evidence item 1>
  - <evidence item 2>
  REJECTED_HYPOTHESES:
  - <rejected hypothesis with reasoning>
  CONFIDENCE: <0.0-1.0>
