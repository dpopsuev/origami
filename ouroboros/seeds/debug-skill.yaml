name: debug-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL

poles:
  methodical:
    signal: "identifies root cause, links to deployment event, rejects red herrings with reasoning"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "jumps to first visible symptom, treats memory warning as root cause, skips deployment correlation"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Application logs from the last 30 minutes showing warnings, errors, and deployment
  history. Contains one subtle root cause (e.g., goroutine leak, connection exhaustion)
  and one obvious red herring (e.g., high memory that is within normal range).

rubric: |
  Evaluate whether the response performs systematic root cause analysis (correlating
  timestamps, deployment events, and progressive degradation patterns) or jumps to
  the most visible symptom without deeper investigation.

generator_instructions: |
  Create a realistic set of application logs (15-25 lines) with:
  1. A red herring symptom (visible but not the root cause)
  2. A subtle root cause with progressive degradation
  3. A deployment event that correlates with the onset
  Ask the subject to identify the root cause, provide evidence, and explain rejected hypotheses.
