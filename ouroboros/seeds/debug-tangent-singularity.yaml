name: debug-tangent-singularity
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  methodical:
    signal: "identifies zero-vector center, pole singularity, collinear vertices, proposes guards for each"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "says the code handles the parallel case, misses the zero-center and collinear edge cases"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Computational geometry function for ordering vertices around a center point
  on a unit sphere. Used to build Voronoi cell boundaries for a polyhedron
  globe renderer. The function constructs a tangent frame from the
  sphere normal, projects vertices onto it, and sorts by angle. Real production
  TypeScript code with subtle numerical edge cases.

rubric: |
  Evaluate whether the response identifies all degenerate inputs (zero center,
  exact pole alignment, collinear/coincident vertices) and explains the
  numerical consequences (NaN propagation, incorrect sorting, visual artifacts)
  or whether it only notes the explicit parallel-vector check without analyzing
  what breaks when it's insufficient.

generator_instructions: |
  Present the orderVerticesAroundCenter function verbatim. Ask the subject to
  identify edge cases, numerical issues, and degenerate inputs.

gold_answer: |
  Edge case 1 (Critical): If center is [0,0,0], normalize returns [NaN,NaN,NaN].
  All downstream math produces NaN. Fix: guard center magnitude > epsilon.
  Edge case 2 (Subtle): If normal is exactly [0,1,0], dot(normal,ref) = 1.0
  which exceeds the 0.9 threshold, so ref switches to [1,0,0]. But if normal
  is [0, 0.95, 0.31], dot = 0.95 > 0.9, ref switches to [1,0,0] — this works.
  However if normal is [0, 0.89, 0.45], dot = 0.89 < 0.9, ref stays [0,1,0],
  and tangentU = normalize([0,1,0] - 0.89*[0,0.89,0.45]) which has very small
  magnitude, amplifying floating point error. The 0.9 threshold is too generous.
  Edge case 3: If a vertex coincides with center, dx=dy=dz=0, angle=atan2(0,0)=0.
  Multiple such vertices sort together correctly but are degenerate.
  Edge case 4: If all vertices project to the same angle (collinear), the sort
  is stable but the polygon degenerates to a line.

gold_signals:
  methodical: ["zero", "NaN", "normalize", "center", "pole", "threshold", "0.9", "magnitude", "epsilon", "collinear", "degenerate", "coincident"]
  reactive: ["handles", "parallel", "looks correct", "0.9 check"]

output_format: |
  EDGE_CASES:
  - <edge case with trigger condition>
  IMPACT:
  - <what breaks for each edge case>
  FIXES:
  - <proposed guard or fix>
  SEVERITY: <critical/high/medium/low for each>
