name: debug-typescript-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  methodical:
    signal: "identifies root cause, links to cache eviction and traffic, rejects red herrings"
    element_affinity:
      speed: 0.3
      shortcut_affinity: 0.2
      convergence_threshold: 0.9
  reactive:
    signal: "jumps to first visible symptom, treats unrelated issue as root cause"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.8
      convergence_threshold: 0.3

context: |
  Next.js app with SSR cache without eviction under 10x traffic. Application
  logs and deployment history. Contains one subtle root cause (SSR cache without
  eviction policy combined with 10x traffic from marketing campaign) and one
  obvious red herring (e.g., memory leak, heap, restart).

rubric: |
  Evaluate whether the response performs systematic root cause analysis
  (correlating cache behavior, ISR removal, traffic patterns) or jumps to
  the most visible symptom without deeper investigation.

generator_instructions: |
  Create a realistic set of Next.js application logs (15-25 lines) with:
  1. A red herring symptom (e.g., memory leak, heap exhaustion, restart)
  2. SSR cache without eviction policy with progressive degradation
  3. ISR removal and 10x traffic from marketing campaign that correlates
     with the onset
  Ask the subject to identify the root cause, provide evidence, and explain
  rejected hypotheses.

gold_answer: |
  SSR cache without eviction policy combined with 10x traffic from marketing campaign.

gold_signals:
  methodical: ["SSR cache", "eviction", "ISR removed", "10x traffic"]
  reactive: ["memory leak", "heap", "restart"]

output_format: |
  ROOT_CAUSE: <one-line diagnosis>
  EVIDENCE:
  - <evidence item 1>
  - <evidence item 2>
  REJECTED_HYPOTHESES:
  - <rejected hypothesis with reasoning>
  CONFIDENCE: <0.0-1.0>
