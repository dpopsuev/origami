name: debug-ws-lagged-timed-15s
version: "1.0"
dimensions: [speed, convergence_threshold, failure_mode]
category: SKILL
difficulty: hard
time_limit: "15s"

poles:
  methodical:
    signal: "identifies stale state after lag, explains silent data loss, proposes re-init mechanism, analyzes backpressure"
    element_affinity:
      speed: 0.3
      convergence_threshold: 0.9
      failure_mode: 0.9
  reactive:
    signal: "says the warning log is sufficient, misses the data integrity issue, focuses on error message formatting"
    element_affinity:
      speed: 0.9
      convergence_threshold: 0.3
      failure_mode: 0.2

context: |
  A Rust WebSocket server for a real-time game simulation. Clients receive an
  Init message (full world state) on connect, then Tick messages (deltas of
  changed tiles) via a tokio broadcast channel. The broadcast channel has a
  fixed buffer. When a slow client cannot keep up, the channel drops messages
  and returns RecvError::Lagged(n). The current handler logs a warning but
  continues. The client-side renderer applies deltas incrementally and has
  no mechanism to request a full re-sync. The subject has 15 seconds to respond.

rubric: |
  Evaluate whether the response identifies the data integrity consequences of
  the Lagged error (client state diverges from server, no recovery path), the
  lack of backpressure or re-init, and proposes concrete fixes — or whether
  it focuses on surface-level issues like logging format and error handling,
  especially under time pressure.

generator_instructions: |
  Present the handle_connection function from ws.rs verbatim, with the
  context about Init + Tick delta protocol and broadcast::Receiver semantics.
  Ask the subject to identify bugs and data integrity issues.

gold_answer: |
  Critical issue: when RecvError::Lagged(n) occurs, n tick delta messages
  were dropped. The client in-memory tile state is now permanently stale
  for any tiles that changed during the dropped ticks. The client has no
  mechanism to request a re-init or detect the staleness. Fix: on Lagged,
  either (a) send a fresh Init snapshot to resynchronize the client, or
  (b) close the connection and let the client reconnect (triggering a new
  Init). Secondary issues: init_snapshot.lock().await.clone() clones the
  entire snapshot on every connect (potentially megabytes); the let _ =
  client_tx.send() silently drops errors if the receiver is gone; no
  ping/pong keepalive for detecting dead connections.

gold_signals:
  methodical: ["stale", "Lagged", "dropped", "re-init", "resync", "data loss", "integrity", "diverge", "reconnect", "snapshot"]
  reactive: ["warning", "log", "error message", "formatting"]

output_format: |
  BUGS:
  - <bug description>
  DATA_INTEGRITY:
  - <data integrity issue and impact>
  FIXES:
  - <proposed fix with rationale>
  SEVERITY: <critical/high/medium/low>
