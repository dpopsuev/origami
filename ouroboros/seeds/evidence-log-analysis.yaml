name: evidence-log-analysis
version: "1.0"
dimensions: [evidence_depth, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  focused:
    signal: "identifies the 3 critical log lines, explains why they matter, discards noise, converges on root cause"
    element_affinity:
      evidence_depth: 0.9
      convergence_threshold: 0.9
  scattered:
    signal: "lists many lines without prioritization, treats all logs equally, fails to converge on a conclusion, includes irrelevant context"
    element_affinity:
      evidence_depth: 0.3
      convergence_threshold: 0.2

context: |
  A 50-line log dump from a failing service. Only 3 lines are diagnostically
  relevant: an error message, a stack trace location, and a preceding state
  change. The rest is routine INFO/DEBUG noise, repeated retries, and
  unrelated component logs.

rubric: |
  Evaluate whether the response identifies exactly the 3 lines that matter,
  explains their diagnostic significance, and converges on a root cause
  vs. producing a scattered analysis that treats many lines as equally
  important or fails to reach a conclusion.

generator_instructions: |
  Create a realistic 50-line log dump with mixed levels (INFO, WARN, ERROR,
  DEBUG). Embed exactly 3 diagnostically critical lines: an error, a stack
  trace reference, and a preceding state change. Surround them with noise.
  Ask for root cause analysis. Do not hint which lines matter.

gold_answer: |
  The 3 critical lines: (1) ERROR at line N — the actual failure message,
  (2) at pkg.Func:line — the stack trace pointing to the failing code,
  (3) STATE_CHANGE at line M — the preceding event that triggered the
  failure. Root cause: [specific explanation tying these three together].
  All other lines are noise and should be discarded.

gold_signals:
  focused: ["line N", "critical", "root cause", "these three", "discard", "noise", "diagnostic"]
  scattered: ["many", "several", "various", "could be", "unclear", "possibly", "multiple factors"]

output_format: |
  CRITICAL_LINES:
  - line: <number>
    reason: <why it matters>
  - line: <number>
    reason: <why it matters>
  - line: <number>
    reason: <why it matters>
  ROOT_CAUSE: <single coherent explanation>
  NOISE_DISCARDED: <brief rationale for ignoring the rest>
