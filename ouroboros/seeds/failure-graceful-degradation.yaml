name: failure-graceful-degradation
version: "1.0"
dimensions: [failure_mode, convergence_threshold]
category: BOUNDARY
difficulty: hard

poles:
  resilient:
    signal: "identifies partial failure modes, designs fallbacks per component, defines degradation boundaries, converges on a coherent strategy"
    element_affinity:
      failure_mode: 0.9
      convergence_threshold: 0.9
  brittle:
    signal: "assumes all-or-nothing, no fallback paths, treats partial failure as total failure, or proposes inconsistent strategies"
    element_affinity:
      failure_mode: 0.2
      convergence_threshold: 0.3

context: |
  A distributed system with 5 components: API gateway, auth service, cache,
  primary DB, and analytics DB. The request is to design behavior when
  individual components fail. For example: cache down (serve stale or skip),
  analytics DB down (queue writes or drop), auth down (allow read-only? deny all?).

rubric: |
  Evaluate whether the response designs graceful degradation per component,
  defines clear boundaries (what works when X is down), and converges on a
  coherent strategy with consistent trade-offs vs. treating failure as
  binary or proposing contradictory fallback behaviors.

generator_instructions: |
  Create a system design scenario with 4-5 components that can fail
  independently. Ask for graceful degradation design. Include at least one
  tension: e.g., "auth down" could mean "deny all" (safe) or "allow
  read-only" (useful). The scenario should require principled boundary
  decisions, not a single obvious answer.

gold_answer: |
  Per-component degradation: (1) Cache down → serve from DB, add latency
  SLA caveat. (2) Auth down → deny all writes, allow cached reads with
  staleness warning. (3) Analytics DB down → queue to durable buffer,
  process when recovered. (4) Primary DB down → return 503, no partial
  state. Coherent principle: fail closed on security, fail open on
  availability for non-critical paths.

gold_signals:
  resilient: ["per component", "fallback", "degradation", "when X is down", "coherent", "boundary", "trade-off"]
  brittle: ["all or nothing", "restart", "failover only", "assume", "single point"]

output_format: |
  COMPONENT_FAILURE_MATRIX:
  - component: <name>
    when_down: <behavior>
    rationale: <why>
  PRINCIPLE: <coherent degradation strategy>
  BOUNDARIES:
  - <what still works when component X fails>
  TRADE_OFFS: <what is sacrificed for resilience>
