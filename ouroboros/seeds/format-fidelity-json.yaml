name: format-fidelity-json
version: "1.0"
dimensions: [convergence_threshold, shortcut_affinity]
category: SKILL
difficulty: medium

poles:
  compliant:
    signal: "outputs valid JSON with correct schema, no markdown wrapping, no extra commentary, parseable by json.Unmarshal"
    element_affinity:
      convergence_threshold: 0.9
      shortcut_affinity: 0.1
  noncompliant:
    signal: "wraps JSON in markdown code blocks, adds explanation before/after, malformed JSON, extra fields"
    element_affinity:
      convergence_threshold: 0.3
      shortcut_affinity: 0.9

context: |
  The task requires raw JSON output that will be consumed by a downstream system.
  Any extra text (markdown, explanation, commentary) will cause parsing failures.

rubric: |
  Evaluate whether the output is valid JSON that would pass json.Unmarshal
  without any preprocessing. Check: no markdown backticks, no explanation
  before or after, correct schema, proper quoting, no trailing commas.

generator_instructions: |
  Ask the subject to analyze a code issue and respond with a JSON object
  containing exactly these fields: {"issue": string, "severity": string,
  "component": string, "fix": string, "confidence": number}. Emphasize
  that the output must be raw JSON with no wrapping.

gold_answer: |
  {"issue":"buffer overflow in parse_header","severity":"critical","component":"http-parser","fix":"add bounds check before memcpy","confidence":0.92}

gold_signals:
  compliant: ["{", "\"issue\"", "\"severity\"", "\"confidence\""]
  noncompliant: ["```", "json", "Here", "Let me"]

output_format: |
  Respond with ONLY a JSON object. No markdown, no explanation, no wrapping.
  Schema: {"issue": string, "severity": string, "component": string, "fix": string, "confidence": number}
