name: format-fidelity-structured
version: "1.0"
dimensions: [convergence_threshold, shortcut_affinity]
category: SKILL
difficulty: easy

poles:
  compliant:
    signal: "follows the exact output format with all required fields, no extra prose, correct section ordering"
    element_affinity:
      convergence_threshold: 0.9
      shortcut_affinity: 0.1
  noncompliant:
    signal: "ignores format requirements, uses natural prose, omits required fields, adds unrequested sections"
    element_affinity:
      convergence_threshold: 0.3
      shortcut_affinity: 0.9

context: |
  A task with a strict machine-parseable output format (e.g., YAML, JSON, or
  labeled sections). The format has specific field names, ordering, and no
  room for extra commentary.

rubric: |
  Evaluate strict format compliance: all required fields present, correct
  ordering, no extra prose outside the format, parseable by a machine.
  Partial compliance (most fields but extra prose) is better than total
  format abandonment.

generator_instructions: |
  Ask the subject to analyze a simple code issue and respond in a strict format:
  STATUS, SEVERITY, COMPONENT, DESCRIPTION, FIX, CONFIDENCE. No other text
  should appear. Emphasize machine parseability.

gold_answer: |
  STATUS: open
  SEVERITY: high
  COMPONENT: auth-service
  DESCRIPTION: Token validation skips expiry check
  FIX: Add time comparison in validateToken()
  CONFIDENCE: 0.95

gold_signals:
  compliant: ["STATUS:", "SEVERITY:", "COMPONENT:", "DESCRIPTION:", "FIX:", "CONFIDENCE:"]
  noncompliant: ["Let me", "Here's", "I think", "In summary"]

output_format: |
  STATUS: <open/resolved/investigating>
  SEVERITY: <critical/high/medium/low>
  COMPONENT: <affected component>
  DESCRIPTION: <one-line description>
  FIX: <proposed fix>
  CONFIDENCE: <0.0-1.0>
