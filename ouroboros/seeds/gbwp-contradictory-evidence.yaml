name: gbwp-contradictory-evidence
version: "1.0"
dimensions: [gbwp, evidence_depth, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  accurate:
    signal: "correct verdict with high confidence, reconciles contradictions, explains which evidence prevails and why"
    element_affinity:
      gbwp: 0.9
      evidence_depth: 0.9
      convergence_threshold: 0.8
  hasty:
    signal: "wrong verdict or low confidence, picks one side without reconciliation, ignores contradicting evidence"
    element_affinity:
      gbwp: 0.2
      evidence_depth: 0.2
      convergence_threshold: 0.3

context: |
  A claim evaluation scenario where evidence items contradict each other.
  Resolving the contradiction requires identifying which evidence is more
  authoritative, more recent, or more directly applicable. Quick verdicts
  tend to latch onto the first plausible reading and miss the contradiction.

rubric: |
  Evaluate whether the response explicitly acknowledges contradictory evidence,
  proposes a principled resolution (authority, recency, scope), and arrives at
  the correct verdict. GBWP measures whether deliberation improves accuracy by
  forcing explicit contradiction resolution.

generator_instructions: |
  Create a claim with 3-5 evidence items where at least two directly contradict
  each other (e.g., different timestamps, conflicting measurements, opposing
  witness accounts). The correct verdict requires choosing which evidence
  prevails and justifying why. The contradiction should not be obvious on
  first pass.

gold_answer: |
  Verdict: CORRECT — the claim is supported after resolving the contradiction.
  Evidence A (more recent / primary source / direct) prevails over Evidence B
  (stale / secondary / indirect). Must explicitly state the contradiction and
  the resolution criterion. Confidence 0.75-0.90.

gold_signals:
  accurate: ["contradict", "reconcil", "prevails", "authority", "recent", "resolution", "evidence"]
  hasty: ["INCORRECT", "confused", "conflicting", "cannot determine", "either"]

output_format: |
  VERDICT: <CORRECT|INCORRECT>
  CONTRADICTION: <describe the conflicting evidence>
  RESOLUTION: <which evidence prevails and why>
  CONFIDENCE: <0.0-1.0>
  JUSTIFICATION: <brief explanation>
