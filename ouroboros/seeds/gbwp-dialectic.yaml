name: gbwp-dialectic
version: "1.1"
dimensions: [gbwp, evidence_depth, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  accurate:
    signal: "correct verdict with high confidence, cites all evidence items, brief justification"
    element_affinity:
      gbwp: 0.9
      evidence_depth: 0.9
      convergence_threshold: 0.8
  hasty:
    signal: "wrong verdict or low confidence, ignores evidence, no justification"
    element_affinity:
      gbwp: 0.2
      evidence_depth: 0.2
      convergence_threshold: 0.3

context: |
  A dialectic scenario with a claim supported by multiple evidence items.
  The claim has a known correct verdict (CORRECT/INCORRECT) and expected
  confidence range. Tests whether the model can accurately evaluate claims
  against evidence at varying levels of deliberation.

rubric: |
  Evaluate whether the response arrives at the correct verdict with appropriate
  confidence, citing supporting evidence. The GBWP dimension measures how
  accuracy scales with the number of dialectic rounds allowed.

generator_instructions: |
  Create a test failure scenario with:
  1. A clear claim about the root cause
  2. 3-5 evidence items (some supporting, some ambiguous)
  3. A known correct verdict
  Ask the subject to evaluate the claim, provide a verdict, confidence, and justification.

gold_answer: |
  Verdict: CORRECT — the claim about the root cause is supported by the
  evidence. Evidence items 1, 3, and 4 directly support the claim.
  Item 2 is ambiguous but does not contradict. Item 5 is a red herring.
  Confidence should be 0.75-0.90 given the ambiguous evidence.

gold_signals:
  accurate: ["verdict", "CORRECT", "evidence", "support", "confidence", "item", "justif"]
  hasty: ["INCORRECT", "unsure", "maybe", "I think"]

output_format: |
  VERDICT: <CORRECT|INCORRECT>
  CONFIDENCE: <0.0-1.0>
  SUPPORTING_EVIDENCE:
  - <evidence item and reasoning>
  CONTRADICTING_EVIDENCE:
  - <evidence item and reasoning>
  JUSTIFICATION: <brief explanation>
