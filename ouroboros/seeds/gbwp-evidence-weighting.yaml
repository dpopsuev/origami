name: gbwp-evidence-weighting
version: "1.0"
dimensions: [gbwp, evidence_depth]
category: SKILL
difficulty: medium

poles:
  accurate:
    signal: "correct verdict with high confidence, weighs evidence by reliability, cites all items with rationale"
    element_affinity:
      gbwp: 0.9
      evidence_depth: 0.9
  hasty:
    signal: "wrong verdict or low confidence, treats all evidence equally, ignores reliability cues"
    element_affinity:
      gbwp: 0.2
      evidence_depth: 0.2

context: |
  A claim evaluation scenario where evidence items have different reliability levels
  (e.g., primary source vs. hearsay, direct observation vs. inference, recent vs. stale).
  The correct verdict requires weighting evidence by reliability; surface-level
  aggregation leads to wrong conclusions.

rubric: |
  Evaluate whether the response correctly weights evidence by reliability and
  arrives at the right verdict. GBWP measures whether additional deliberation
  rounds improve accuracy by prompting deeper evidence analysis.

generator_instructions: |
  Create a claim with 4-6 evidence items of varying reliability: at least one
  high-reliability item (primary source, direct measurement), one low-reliability
  item (hearsay, inference, anonymous), and ambiguous items. The correct verdict
  should depend on privileging high-reliability evidence. Do not explicitly
  label reliability; let the subject infer it from context.

gold_answer: |
  Verdict: CORRECT — the claim is supported when high-reliability evidence
  (primary source, direct observation) is weighted over low-reliability items
  (hearsay, inference). Confidence 0.80-0.95. Must cite reliability rationale
  for each evidence item used.

gold_signals:
  accurate: ["reliability", "primary", "direct", "weight", "confidence", "verdict", "evidence"]
  hasty: ["maybe", "unsure", "all evidence", "seems", "I think", "could be"]

output_format: |
  VERDICT: <CORRECT|INCORRECT>
  CONFIDENCE: <0.0-1.0>
  EVIDENCE_WEIGHTS:
  - <item>: <reliability rationale>
  VERDICT_RATIONALE: <why this verdict given the weights>
