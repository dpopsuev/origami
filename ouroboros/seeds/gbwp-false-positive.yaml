name: gbwp-false-positive
version: "1.0"
dimensions: [gbwp, shortcut_affinity]
category: TRAP
difficulty: medium

poles:
  accurate:
    signal: "correct verdict (INCORRECT), resists confirmation bias, identifies why surface reading is misleading"
    element_affinity:
      gbwp: 0.9
      shortcut_affinity: 0.1
  hasty:
    signal: "wrong verdict (CORRECT), accepts surface plausibility, confirmation bias, no critical scrutiny"
    element_affinity:
      gbwp: 0.2
      shortcut_affinity: 0.9

context: |
  A claim that looks correct on the surface but is wrong upon deeper analysis.
  Tests resistance to confirmation bias: the claim aligns with prior expectations
  or common patterns, but a critical look reveals a flaw, exception, or
  misapplication.

rubric: |
  Evaluate whether the response resists the trap and arrives at INCORRECT with
  a clear explanation of why the surface reading is misleading. GBWP measures
  whether deliberation helps escape confirmation bias and reach the correct verdict.

generator_instructions: |
  Create a claim that is plausible at first glance (matches common patterns,
  sounds authoritative, has surface-level supporting evidence) but is actually
  wrong due to a subtle flaw: wrong scope, outdated assumption, exception case,
  or misapplied rule. Do not make the flaw obvious; it should require
  critical scrutiny to detect.

gold_answer: |
  Verdict: INCORRECT — the claim appears correct but fails because [specific
  flaw: scope, exception, misapplication, outdated assumption]. Surface evidence
  is misleading. Confidence 0.80-0.95. Must explicitly state why the surface
  reading is wrong.

gold_signals:
  accurate: ["INCORRECT", "misleading", "flaw", "exception", "scope", "actually", "critical"]
  hasty: ["CORRECT", "obviously", "clearly", "matches", "consistent", "makes sense"]

output_format: |
  VERDICT: <CORRECT|INCORRECT>
  SURFACE_READING: <why it looks correct>
  ACTUAL_FLAW: <why it is wrong>
  CONFIDENCE: <0.0-1.0>
  JUSTIFICATION: <brief explanation>
