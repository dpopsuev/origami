name: gbwp-incomplete-evidence
version: "1.0"
dimensions: [gbwp, convergence_threshold]
category: BOUNDARY
difficulty: medium

poles:
  accurate:
    signal: "correct verdict (INCONCLUSIVE), acknowledges insufficient evidence, lists what would resolve it"
    element_affinity:
      gbwp: 0.9
      convergence_threshold: 0.9
  hasty:
    signal: "wrong verdict (CORRECT or INCORRECT), overclaims with low evidence, premature conclusion"
    element_affinity:
      gbwp: 0.2
      convergence_threshold: 0.3

context: |
  A claim evaluation scenario where evidence is insufficient to reach a
  definitive conclusion. The correct response is INCONCLUSIVE with a clear
  statement of what additional evidence would resolve the question.
  Premature verdicts (CORRECT or INCORRECT) indicate overconfidence.

rubric: |
  Evaluate whether the response correctly declares INCONCLUSIVE, explains
  why evidence is insufficient, and specifies what would resolve the question.
  GBWP measures whether deliberation helps avoid premature conclusions.

generator_instructions: |
  Create a claim with 2-3 evidence items that are suggestive but insufficient:
  ambiguous, partial, or missing a critical piece. The correct verdict is
  INCONCLUSIVE. Do not include enough evidence for a definitive answer.
  Specify what additional evidence would be needed.

gold_answer: |
  Verdict: INCONCLUSIVE — evidence is insufficient because [missing piece,
  ambiguity, or gap]. Additional evidence needed: [specific items or tests].
  Confidence in INCONCLUSIVE: 0.85-0.95. Must not claim CORRECT or INCORRECT.

gold_signals:
  accurate: ["INCONCLUSIVE", "insufficient", "additional", "would need", "cannot determine", "ambiguous"]
  hasty: ["CORRECT", "INCORRECT", "likely", "probably", "clearly", "obviously"]

output_format: |
  VERDICT: <CORRECT|INCORRECT|INCONCLUSIVE>
  EVIDENCE_GAP: <what is missing or ambiguous>
  ADDITIONAL_NEEDED: <what would resolve the question>
  CONFIDENCE: <0.0-1.0>
  RATIONALE: <why this verdict>
