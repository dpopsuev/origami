name: gbwp-multi-step-proof
version: "1.0"
dimensions: [gbwp, evidence_depth, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  accurate:
    signal: "correct verdict with high confidence, traces all logical steps, verifies each link in the chain"
    element_affinity:
      gbwp: 0.9
      evidence_depth: 0.9
      convergence_threshold: 0.8
  hasty:
    signal: "wrong verdict or low confidence, skips steps, assumes intermediate conclusions without verification"
    element_affinity:
      gbwp: 0.2
      evidence_depth: 0.2
      convergence_threshold: 0.3

context: |
  A logical argument requiring 3+ steps to verify. The claim depends on a chain
  of inferences; a flaw in any step invalidates the conclusion. Surface-level
  reading may accept the conclusion without verifying the chain.

rubric: |
  Evaluate whether the response traces and verifies each step of the argument,
  identifies any weak links, and arrives at the correct verdict. GBWP measures
  whether deliberation improves accuracy by forcing step-by-step verification.

generator_instructions: |
  Create a claim backed by a multi-step logical argument (A → B → C → claim).
  Include at least one step that is non-obvious or easy to assume without
  verification. The correct verdict requires explicitly checking each step.
  Optionally include a subtle flaw in one step that invalidates the conclusion.

gold_answer: |
  Verdict: CORRECT/INCORRECT — depends on whether all steps hold. Must trace
  each step: Step 1 (A→B) verified because... Step 2 (B→C) verified because...
  Step 3 (C→claim) verified because... If any step fails, verdict is INCORRECT.
  Confidence 0.80-0.95 when all steps are explicitly verified.

gold_signals:
  accurate: ["step", "verify", "chain", "inference", "therefore", "because", "link"]
  hasty: ["obvious", "clearly", "follows", "therefore", "conclusion", "assume"]

output_format: |
  VERDICT: <CORRECT|INCORRECT>
  STEP_1: <A→B verification>
  STEP_2: <B→C verification>
  STEP_3: <C→claim verification>
  WEAK_LINKS: <any step that fails or is unverified>
  CONFIDENCE: <0.0-1.0>
