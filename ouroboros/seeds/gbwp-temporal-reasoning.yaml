name: gbwp-temporal-reasoning
version: "1.0"
dimensions: [gbwp, evidence_depth]
category: SKILL
difficulty: hard

poles:
  accurate:
    signal: "correct verdict with high confidence, orders events correctly, explains why timeline matters"
    element_affinity:
      gbwp: 0.9
      evidence_depth: 0.9
  hasty:
    signal: "wrong verdict or low confidence, ignores or misorders events, treats timeline as irrelevant"
    element_affinity:
      gbwp: 0.2
      evidence_depth: 0.2

context: |
  A claim evaluation scenario where event ordering affects the verdict.
  Evidence items have implicit or explicit timestamps; causality or
  applicability depends on correct temporal ordering. Surface reading
  may treat events as unordered and reach the wrong conclusion.

rubric: |
  Evaluate whether the response correctly orders events, identifies temporal
  dependencies, and arrives at the right verdict. GBWP measures whether
  deliberation improves accuracy by forcing explicit timeline analysis.

generator_instructions: |
  Create a claim where the verdict depends on event ordering (e.g., A must
  precede B for the claim to hold; a fix deployed after an incident cannot
  have caused it; a policy change affects only post-change events). Include
  3-5 evidence items with timestamps or implicit ordering. The correct
  verdict requires explicit timeline construction.

gold_answer: |
  Verdict: CORRECT/INCORRECT — depends on timeline. Timeline: [ordered events].
  The claim holds/fails because [temporal reasoning]. Confidence 0.80-0.95.
  Must explicitly construct and cite the timeline.

gold_signals:
  accurate: ["timeline", "order", "before", "after", "precede", "subsequent", "chronolog"]
  hasty: ["evidence", "suggests", "maybe", "could be", "unclear", "either way"]

output_format: |
  VERDICT: <CORRECT|INCORRECT>
  TIMELINE: <ordered list of events with timestamps>
  TEMPORAL_REASONING: <why order matters for the verdict>
  CONFIDENCE: <0.0-1.0>
  JUSTIFICATION: <brief explanation>
