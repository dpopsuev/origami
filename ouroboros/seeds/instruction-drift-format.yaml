name: instruction-drift-format
version: "1.0"
dimensions: [convergence_threshold, shortcut_affinity]
category: BOUNDARY
difficulty: medium
rounds: 3

poles:
  consistent:
    signal: "maintains exact output format across all rounds despite topic changes, follows instructions precisely"
    element_affinity:
      convergence_threshold: 0.9
      shortcut_affinity: 0.1
  drifting:
    signal: "output format degrades over rounds, drops required sections, reverts to natural prose"
    element_affinity:
      convergence_threshold: 0.3
      shortcut_affinity: 0.9

context: |
  The subject is given a strict output format in round 1 and asked to apply it
  to different topics across 3 rounds. Tests whether the format is maintained
  when the content changes but the instructions stay the same.

rubric: |
  Evaluate whether the response maintains the exact requested output format
  across all rounds. Check for: section headers present, ordering preserved,
  required fields filled, no extra prose outside the format. Partial drift
  (dropping one section) is less severe than total format abandonment.

generator_instructions: |
  Round 1: Define a strict output format (e.g., ISSUE/SEVERITY/IMPACT/FIX/CONFIDENCE)
  and ask the subject to analyze a simple bug. Round 2-3: Present different bugs
  but keep the format requirement identical. The format should be non-trivial
  (5+ required sections).

gold_answer: |
  All three rounds produce output in the exact requested format with all
  required sections. Content changes but structure is identical.

gold_signals:
  consistent: ["ISSUE:", "SEVERITY:", "IMPACT:", "FIX:", "CONFIDENCE:"]
  drifting: ["the issue is", "I think", "overall"]

output_format: |
  ISSUE: <one-line description>
  SEVERITY: <critical/high/medium/low>
  IMPACT: <affected components>
  FIX: <proposed fix>
  CONFIDENCE: <0.0-1.0>
