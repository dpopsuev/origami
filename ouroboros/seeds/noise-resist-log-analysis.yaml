name: noise-resist-log-analysis
version: "1.0"
dimensions: [speed, convergence_threshold, evidence_depth]
category: SKILL
difficulty: medium

poles:
  focused:
    signal: "filters noise, identifies the signal in verbose output, separates root cause from incidental errors"
    element_affinity:
      speed: 0.4
      convergence_threshold: 0.9
      evidence_depth: 0.9
  distracted:
    signal: "treats every log line as significant, overwhelmed by volume, cannot separate signal from noise"
    element_affinity:
      speed: 0.8
      convergence_threshold: 0.2
      evidence_depth: 0.2

context: |
  A production incident log dump containing 100+ lines of output. Most lines
  are routine (health checks, periodic GC, info-level metrics). Buried within
  are 3-5 lines that indicate the actual problem. Several misleading error
  messages are caused by the root issue, not independent problems.

rubric: |
  Evaluate whether the response successfully filters noise from signal,
  identifies the genuine root cause lines, and correctly classifies
  cascading errors as symptoms rather than independent issues.

generator_instructions: |
  Create a realistic log dump (50-80 lines) that is mostly noise (health checks,
  periodic metrics, routine GC) with a genuine root cause buried in the middle
  (e.g., certificate expiry, DNS resolution failure, connection pool exhaustion).
  Include 3-4 cascading error messages that look important but are symptoms.

gold_answer: |
  Identifies the 3-5 signal lines from the noise. Correctly classifies
  cascading errors as symptoms of the root cause. Does NOT list every
  error line as a separate finding.

gold_signals:
  focused: ["root cause", "caused by", "symptom", "cascading", "noise", "routine", "ignore"]
  distracted: ["error on line", "another error", "also failing", "multiple issues"]

output_format: |
  SIGNAL_LINES:
  - <line number>: <why this matters>
  NOISE_DISMISSED:
  - <category of noise dismissed>
  ROOT_CAUSE: <diagnosis>
  CASCADE: <which errors are symptoms>
