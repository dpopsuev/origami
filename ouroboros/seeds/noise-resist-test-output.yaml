name: noise-resist-test-output
version: "1.0"
dimensions: [speed, convergence_threshold, evidence_depth]
category: SKILL
difficulty: easy

poles:
  focused:
    signal: "isolates the failing test, ignores passing tests, identifies the assertion that failed and the likely code path"
    element_affinity:
      speed: 0.4
      convergence_threshold: 0.9
      evidence_depth: 0.8
  distracted:
    signal: "discusses passing tests, treats warnings as failures, cannot identify which test actually failed"
    element_affinity:
      speed: 0.8
      convergence_threshold: 0.2
      evidence_depth: 0.2

context: |
  A CI test suite output showing 50+ test results. Most tests pass. One or two
  tests fail. Several tests emit deprecation warnings that are not failures.
  The output is interleaved and verbose.

rubric: |
  Evaluate whether the response correctly identifies only the failing tests,
  ignores passing tests and warnings, and provides actionable analysis of
  the failures.

generator_instructions: |
  Create a realistic Go test output (40-60 lines) with many PASS results,
  a few deprecation warnings, and exactly 2 FAIL results. The failures
  should have clear assertion messages but be buried in verbose output.

gold_answer: |
  Identifies exactly the 2 failing tests by name, quotes their assertion
  errors, and ignores the passing tests and warnings. Does not treat
  deprecation warnings as test failures.

gold_signals:
  focused: ["FAIL", "assertion", "expected", "got", "failing test", "ignore warning"]
  distracted: ["warning", "deprecat", "all tests", "50 tests"]

output_format: |
  FAILURES:
  - <test name>: <assertion error>
  ANALYSIS: <likely cause>
  WARNINGS_DISMISSED: <count and reason>
