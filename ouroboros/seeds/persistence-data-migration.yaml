name: persistence-data-migration
version: "1.0"
dimensions: [persistence, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  robust:
    signal: "handles schema mismatches, type coercion, missing fields, backfill strategy, rollback plan"
    element_affinity:
      persistence: 0.9
      convergence_threshold: 0.85
  brittle:
    signal: "assumes 1:1 field mapping, fails on missing data, no rollback, single-pass only"
    element_affinity:
      persistence: 0.25
      convergence_threshold: 0.35

context: |
  A data migration task between incompatible schemas: e.g., v1 API response
  format to v2, or legacy DB schema to new normalized structure. Source data
  has missing fields, type mismatches, and legacy quirks. A robust migration
  handles all cases with fallbacks and rollback; a brittle one assumes perfect
  data and fails on first anomaly.

rubric: |
  Evaluate whether the migration handles schema mismatches, missing or null
  fields, type coercion, provides a rollback strategy, and can resume from
  partial failure vs. assuming identical schemas and failing on any deviation.

generator_instructions: |
  Create a migration scenario: source schema (e.g., JSON with optional fields,
  mixed types) and target schema (e.g., SQL with NOT NULL, enums). Include 2-3
  incompatibilities that require explicit handling. The task should reward
  someone who anticipates and handles each case.

gold_answer: |
  Migration provides: (1) mapping for all fields with default values for
  missing source fields, (2) type coercion (string->int, enum normalization),
  (3) validation step before write, (4) idempotent batches with checkpointing,
  (5) rollback script or reverse migration. Handles null, empty string, and
  legacy sentinel values.

gold_signals:
  robust: ["default", "coerce", "missing", "rollback", "checkpoint", "idempotent"]
  brittle: ["assume", "1:1", "fail", "no rollback", "single pass"]

output_format: |
  Respond with:
  MAPPING: <source field -> target field, with defaults>
  TYPE_COERCIONS: <list of conversions>
  EDGE_CASES_HANDLED: <missing, null, legacy values>
  ROLLBACK_STRATEGY: <description>
  CODE: <migration script or pseudocode>
