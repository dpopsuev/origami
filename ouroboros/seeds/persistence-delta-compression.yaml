name: persistence-delta-compression
version: "1.0"
dimensions: [persistence, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  thorough:
    signal: "adds soil_fertility to all three locations, identifies f32 equality issue, spots water_salinity cache-only field, spots impossible guard"
    element_affinity:
      persistence: 0.9
      convergence_threshold: 0.8
  minimal:
    signal: "adds soil_fertility to one or two locations, misses the f32 comparison issue, ignores the impossible check"
    element_affinity:
      persistence: 0.2
      convergence_threshold: 0.4

context: |
  Delta compression for a Bevy ECS game simulation with 10k+ tiles. Each tick,
  only tiles whose mutable state changed since last tick are included in the
  wire update. The function compares current component state against a cached
  previous snapshot using field-by-field equality. The task is to add a new
  soil_fertility field while also reviewing the existing implementation.

rubric: |
  Evaluate whether the implementation comprehensively updates all three
  locations (change detection, TileDelta push, TileMutableState cache) and
  identifies existing issues (f32 equality, salinity asymmetry, dead check)
  or whether it only partially implements the extension and misses the
  pre-existing problems.

generator_instructions: |
  Present the build_tick_update function verbatim. Ask the subject to extend
  it with a soil_fertility field and identify any existing bugs.

gold_answer: |
  Extension: (1) Add soil_fertility to the change detection comparison.
  (2) Add soil_fertility to TileDelta construction.
  (3) Add soil_fertility to TileMutableState cache update.
  Issues found: (a) f32 fields (water_availability, food_production,
  food_surplus) use != for comparison -- floating point equality is fragile
  and should use an epsilon threshold or track changes via hash. (b)
  water_salinity is stored in TileMutableState but never appears in
  TileDelta -- clients never see salinity changes. (c) The more-deltas-
  than-tiles check is impossible: the loop iterates tiles exactly once, so
  changed_tiles.len() <= tile_count always holds. (d) tiles.iter().count()
  traverses the query a second time just for the length.

gold_signals:
  thorough: ["soil_fertility", "f32", "epsilon", "float", "equality", "water_salinity", "never sent", "impossible", "dead check", "all three"]
  minimal: ["added field", "TODO", "simple"]

output_format: |
  EXTENSION:
  - <change 1 with code snippet>
  - <change 2>
  - <change 3>
  EXISTING_ISSUES:
  - <issue with explanation>
  CONFIDENCE: <0.0-1.0>
