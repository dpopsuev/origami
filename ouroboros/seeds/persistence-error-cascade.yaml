name: persistence-error-cascade
version: "1.0"
dimensions: [persistence, failure_mode]
category: BOUNDARY
difficulty: hard

poles:
  tracer:
    signal: "traces error across service boundaries, identifies propagation path, distinguishes root cause from symptoms"
    element_affinity:
      persistence: 0.95
      failure_mode: 0.9
  stopper:
    signal: "stops at first boundary, blames the immediate caller, no upstream or downstream tracing"
    element_affinity:
      persistence: 0.2
      failure_mode: 0.25

context: |
  An error that propagates across multiple service boundaries: e.g., a timeout
  in Service C caused by a slow query in Service B, which was triggered by
  malformed input from Service A. A stopper blames Service C; a tracer follows
  the cascade upstream to find the true origin and downstream to see cascading
  failures.

rubric: |
  Evaluate whether the response traces the error across all relevant service
  boundaries, distinguishes root cause from propagated symptoms, and identifies
  the propagation path vs. stopping at the first service that reported the
  error and attributing blame there.

generator_instructions: |
  Create an error scenario with 3-4 services in a chain. Provide partial logs
  from each service. The root cause should be in an upstream service; downstream
  services show symptoms (timeouts, 5xx) that are consequences. The task
  rewards someone who traces the full chain.

gold_answer: |
  Trace: (1) Service D returns 504 — symptom. (2) Service D calls Service C;
  C times out. (3) Service C calls Service B; B returns slow/erroneous data.
  (4) Service B receives malformed request from Service A. Root cause: Service
  A sends invalid payload; B does not validate; C/D cascade. Fix: add validation
  in A or B.

gold_signals:
  tracer: ["upstream", "cascade", "propagation", "root cause", "boundary", "chain"]
  stopper: ["blame", "first service", "immediate", "no trace"]

output_format: |
  Respond with:
  PROPAGATION_CHAIN:
  - <Service>: <symptom> <- <trigger>
  ROOT_CAUSE: <service and reason>
  CASCADING_EFFECTS: <how error propagated>
  RECOMMENDED_FIX: <where and what>
