name: persistence-incremental-feature
version: "1.0"
dimensions: [persistence, shortcut_affinity]
category: SKILL
difficulty: medium

poles:
  disciplined:
    signal: "splits work into logical commits, each buildable and testable, clear commit messages, no monolithic dump"
    element_affinity:
      persistence: 0.9
      shortcut_affinity: 0.15
  monolithic:
    signal: "single large commit, mixed concerns, no intermediate checkpoints, hard to review or revert"
    element_affinity:
      persistence: 0.25
      shortcut_affinity: 0.85

context: |
  A feature implementation task that should be done incrementally: add a new API
  endpoint with validation, storage, and tests. A disciplined approach produces
  separate commits for schema, storage layer, handler, validation, and tests —
  each independently buildable. A monolithic approach dumps everything in one
  commit.

rubric: |
  Evaluate whether the response proposes or demonstrates incremental commits
  with clear separation of concerns, each commit building and testing successfully,
  vs. a single large change that mixes multiple concerns and is difficult to
  review or bisect.

generator_instructions: |
  Create a feature task with 4-5 natural incremental steps (e.g., schema change,
  repository method, handler, validation, tests). Specify that each step should
  be a separate commit. The task should reward someone who plans the sequence
  and executes it methodically.

gold_answer: |
  Incremental commits: (1) Add DB schema migration and model types. (2) Add
  repository Insert/Get methods with unit tests. (3) Add HTTP handler with
  request parsing. (4) Add validation layer and error responses. (5) Add
  integration test. Each commit has a clear message and passes `go build` and
  `go test`.

gold_signals:
  disciplined: ["commit", "incremental", "separate", "buildable", "bisect"]
  monolithic: ["single commit", "all at once", "dump", "mixed"]

output_format: |
  Respond with:
  COMMIT_PLAN:
  - <commit 1>: <scope and rationale>
  - <commit 2>: <scope and rationale>
  CODE: <implementation for each commit, labeled>
  VERIFICATION: <how each commit was validated>
