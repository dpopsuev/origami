name: persistence-iterative-debug
version: "1.0"
dimensions: [persistence, convergence_threshold]
category: SKILL
difficulty: hard

poles:
  systematic:
    signal: "forms hypotheses, tests each, narrows scope, documents findings, iterates until root cause found"
    element_affinity:
      persistence: 0.95
      convergence_threshold: 0.9
  shallow:
    signal: "tries one fix, gives up or guesses, no hypothesis tracking, surface-level diagnosis"
    element_affinity:
      persistence: 0.2
      convergence_threshold: 0.3

context: |
  A debugging scenario where the symptom is clear (e.g., intermittent timeout,
  wrong output under load) but the root cause requires multiple hypothesis rounds:
  ruling out network vs. logic, narrowing to a specific goroutine or code path,
  reproducing with a minimal test case. A shallow approach tries one fix and
  stops; a systematic approach iterates until the true cause is identified.

rubric: |
  Evaluate whether the response demonstrates hypothesis-driven debugging with
  explicit tests for each hypothesis, narrowing of scope, and iteration until
  root cause is found vs. a single guess or surface-level fix that may not
  address the underlying issue.

generator_instructions: |
  Create a debugging scenario with a non-obvious bug that requires at least 3
  hypothesis rounds to isolate. Provide logs, stack traces, or reproduction
  steps that point in multiple directions. The correct diagnosis should require
  ruling out at least two plausible but wrong hypotheses first.

gold_answer: |
  Debugging process: (1) Hypothesis 1 (network): ruled out by local repro.
  (2) Hypothesis 2 (race): ruled out by adding sync; symptom persists. (3)
  Hypothesis 3 (goroutine leak): confirmed via pprof; identified leak source
  in worker pool. (4) Fix: close channel / add context cancellation. (5)
  Verification: minimal repro passes, load test stable.

gold_signals:
  systematic: ["hypothesis", "ruled out", "narrow", "repro", "root cause", "iterate"]
  shallow: ["try", "maybe", "guess", "one fix", "assume"]

output_format: |
  Respond with:
  HYPOTHESES:
  - <hypothesis>: <test performed> -> <result>
  ROOT_CAUSE: <description>
  FIX: <code or steps>
  VERIFICATION: <how confirmed>
