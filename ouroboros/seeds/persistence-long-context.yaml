name: persistence-long-context
version: "1.0"
dimensions: [persistence, evidence_depth]
category: SKILL
difficulty: hard

poles:
  comprehensive:
    signal: "captures key points from all sections, preserves nuance, cites specific passages, no omission of critical details"
    element_affinity:
      persistence: 0.95
      evidence_depth: 0.9
  superficial:
    signal: "summarizes only the beginning, drops middle and end, generic statements, loses important caveats"
    element_affinity:
      persistence: 0.25
      evidence_depth: 0.2

context: |
  A task to summarize a very long document (e.g., 50-page RFC, multi-chapter
  design doc, or verbose API specification) without losing critical details.
  The document has important information distributed throughout; a quick summary
  captures only the intro; a persistent approach reads and synthesizes the
  entire document.

rubric: |
  Evaluate whether the summary reflects content from all major sections of the
  document, preserves key caveats and exceptions, and cites specific passages
  vs. summarizing only the first portion or producing generic high-level
  statements that omit critical details.

generator_instructions: |
  Create a long-form document (or describe its structure) with 6-10 sections.
  Specify 2-3 critical details that appear only in later sections. The task
  should reward someone who reads the full document; a shortcut approach will
  miss at least one important point.

gold_answer: |
  Summary includes: (1) executive overview from intro, (2) key decisions from
  sections 2-4, (3) critical caveat from section 5 (e.g., "does not apply when
  X"), (4) edge case from section 7, (5) migration path from appendix. Each
  point cites the section or paragraph number.

gold_signals:
  comprehensive: ["section", "throughout", "caveat", "appendix", "cite", "all parts"]
  superficial: ["overview", "generally", "in summary", "first part only"]

output_format: |
  Respond with:
  EXECUTIVE_SUMMARY: <2-3 sentences>
  KEY_POINTS:
  - <point> (Section N)
  - <point> (Section N)
  CRITICAL_CAVEATS: <any exceptions or edge cases from later sections>
  OMISSIONS: <if any sections were not fully covered, list them>
