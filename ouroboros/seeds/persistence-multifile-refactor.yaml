name: persistence-multifile-refactor
version: "1.0"
dimensions: [persistence, evidence_depth]
category: SKILL
difficulty: medium

poles:
  thorough:
    signal: "tracks all call sites, updates imports, preserves invariants across files, documents cross-file dependencies"
    element_affinity:
      persistence: 0.9
      evidence_depth: 0.85
  minimal:
    signal: "changes one file, leaves broken references, assumes callers will be fixed later"
    element_affinity:
      persistence: 0.2
      evidence_depth: 0.3

context: |
  A refactoring task that spans multiple interdependent Go files: moving a type
  from package A to package B, renaming an exported function used in 5 call sites,
  or splitting a large file into modules. A quick approach changes one file and
  leaves the build broken; a persistent approach traces all dependencies and
  updates every affected file.

rubric: |
  Evaluate whether the response identifies and updates all affected files, preserves
  import paths and type compatibility, and documents cross-file invariants vs.
  making partial changes that leave the codebase in a broken or inconsistent state.

generator_instructions: |
  Create a refactoring task that touches 3-5 files: a shared type, its consumers,
  and possibly a test file. Specify the exact files and their relationships. The
  task should be solvable by someone who methodically traces dependencies, but
  a quick fix will miss at least one call site.

gold_answer: |
  Refactoring completes: (1) moves the type to the new package with updated
  doc comments, (2) updates all import statements in consumer files, (3) fixes
  all call sites and type references, (4) updates or adds tests that cover the
  moved code, (5) verifies build passes with `go build ./...`.

gold_signals:
  thorough: ["all files", "import", "call site", "invariant", "go build", "trace"]
  minimal: ["TODO", "fix later", "single file", "broken"]

output_format: |
  Respond with the refactored code for each affected file. After the code, provide:
  FILES_CHANGED:
  - <path>: <summary of changes>
  DEPENDENCIES_TRACED: <yes/no>
  BUILD_VERIFIED: <yes/no>
