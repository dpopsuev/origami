name: persistence-multiround
version: "1.0"
dimensions: [persistence, convergence_threshold]
category: SKILL
difficulty: hard
rounds: 3

poles:
  persistent:
    signal: "improves answer across rounds, incorporates feedback, deepens analysis each iteration"
    element_affinity:
      persistence: 0.9
      convergence_threshold: 0.9
  static:
    signal: "ignores feedback, repeats same answer, no improvement between rounds"
    element_affinity:
      persistence: 0.1
      convergence_threshold: 0.2

context: |
  A multi-round debugging scenario where the first answer is expected to be
  incomplete. The judge provides feedback pointing to missed evidence. A
  persistent model integrates the feedback and improves; a static model
  repeats the same analysis.

rubric: |
  Evaluate whether the response improves across rounds. Does the subject
  incorporate the judge's feedback? Does the analysis deepen with each
  iteration? Or does the subject repeat the same surface-level answer?

generator_instructions: |
  Create a debugging scenario with layered complexity:
  1. Surface-level symptom (easy to find)
  2. Intermediate cause (requires deployment correlation)
  3. Root cause (requires tracing through 2+ service boundaries)
  The scenario should reward iterative deepening.

gold_answer: |
  Round 1: Surface symptom identified (error messages).
  Round 2: Deployment correlation discovered after feedback.
  Round 3: Full root cause chain traced through service boundaries.
  Progressive improvement demonstrates persistence.

gold_signals:
  persistent: ["feedback", "additionally", "upon further", "missed", "correcting", "deeper"]
  static: ["as I said", "same as before", "my previous answer"]

output_format: |
  ROOT_CAUSE: <one-line diagnosis>
  EVIDENCE:
  - <evidence item>
  CONFIDENCE: <0.0-1.0>
  IMPROVEMENT_FROM_FEEDBACK: <what changed since last round>
