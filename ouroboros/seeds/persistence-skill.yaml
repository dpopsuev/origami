name: persistence-skill
version: "1.1"
dimensions: [persistence, convergence_threshold]
category: SKILL
difficulty: medium

poles:
  thorough:
    signal: "handles all formats including edge cases, proper error handling for each, clean function decomposition"
    element_affinity:
      persistence: 0.9
      convergence_threshold: 0.8
  minimal:
    signal: "handles only the common cases, skips edge cases, single monolithic function"
    element_affinity:
      persistence: 0.2
      convergence_threshold: 0.4

context: |
  A task requiring implementation of a multi-format configuration parser that
  must handle JSON, YAML, TOML, and .env files. Each format has different edge
  cases (comments, nested structures, type coercion). A naive approach handles
  only the easy cases; a persistent approach covers all formats comprehensively.

rubric: |
  Evaluate whether the implementation handles all specified formats with proper
  error handling, clean separation of concerns, and coverage of edge cases vs.
  implementing only the most common formats or providing a single function that
  becomes unwieldy.

generator_instructions: |
  Create a configuration parsing task with 3-4 input formats. Specify edge cases
  for each format that a quick implementation would miss. The task should be
  solvable but reward thoroughness — the easy path produces working code that
  fails on edge cases.

gold_answer: |
  Implementation provides: (1) a Parser interface with per-format implementations,
  (2) JSON parser handling trailing commas and comments via preprocessing,
  (3) YAML parser handling anchors and merge keys, (4) TOML parser handling
  datetime and inline tables, (5) .env parser handling quoted values, multiline,
  and variable expansion. Each parser returns typed config values with error
  wrapping that identifies the format and line number.

gold_signals:
  thorough: ["interface", "edge case", "error", "quoted", "multiline", "expansion", "each format"]
  minimal: ["json.Unmarshal", "only", "TODO", "skip"]

output_format: |
  Respond with the Go implementation. After the code, provide:
  FORMATS_HANDLED:
  - <format>: <edge cases covered>
  EDGE_CASES_SKIPPED: <any intentionally deferred>

verify:
  language: go
  compile: "go build ./..."
  test: "go test -run TestParseConfig ./..."
  benchmark: "go test -bench=BenchmarkParseConfig -benchtime=1s ./..."
  benchmark_threshold_ms: 5000
  test_file: |
    package main

    import (
      "testing"
    )

    func TestParseConfig_Properties(t *testing.T) {
      input := `database.host = "localhost"`
      cfg, err := ParseConfig(input)
      if err != nil { t.Fatal(err) }
      if cfg["database.host"] != "localhost" {
        t.Errorf("got %v", cfg["database.host"])
      }
    }

    func TestParseConfig_INI(t *testing.T) {
      input := "[features]\nenable_cache: true"
      cfg, err := ParseConfig(input)
      if err != nil { t.Fatal(err) }
      if cfg["features.enable_cache"] == nil {
        t.Error("missing features.enable_cache")
      }
    }
