name: persistence-test-coverage
version: "1.0"
dimensions: [persistence, evidence_depth]
category: SKILL
difficulty: easy

poles:
  comprehensive:
    signal: "covers happy path, edge cases, error paths, nil inputs, boundary values, table-driven tests"
    element_affinity:
      persistence: 0.9
      evidence_depth: 0.85
  minimal:
    signal: "one or two happy-path tests, skips errors and edge cases, no table-driven structure"
    element_affinity:
      persistence: 0.25
      evidence_depth: 0.3

context: |
  A task to write tests for a function that has multiple code paths: success
  cases, error returns, edge cases (empty input, nil, boundary values). A
  comprehensive approach uses table-driven tests covering all paths; a minimal
  approach tests only the happy path.

rubric: |
  Evaluate whether the tests cover success and failure paths, edge cases
  (empty, nil, boundary), and use table-driven structure where appropriate
  vs. a single or few tests that only exercise the common case.

generator_instructions: |
  Provide a Go function (15-30 lines) with at least 3 distinct code paths:
  success, at least one error return, and an edge case (e.g., empty slice,
  nil pointer, zero value). The function should be straightforward to test
  but reward thoroughness.

gold_answer: |
  Tests include: (1) table-driven cases for success with various inputs,
  (2) error path when input is invalid, (3) edge case for empty/nil input,
  (4) boundary value if applicable. Uses t.Run for subtest names. Coverage
  reaches all branches.

gold_signals:
  comprehensive: ["table", "edge case", "error", "nil", "boundary", "t.Run"]
  minimal: ["happy", "only", "skip", "TODO"]

output_format: |
  Respond with the Go test code. After the code, provide:
  PATHS_COVERED:
  - <path>: <test case>
  EDGE_CASES: <list>
  COVERAGE_ESTIMATE: <branches covered / total>
