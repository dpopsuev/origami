name: refactor-globe-renderer
version: "1.0"
dimensions: [speed, shortcut_affinity, evidence_depth]
category: SKILL
difficulty: medium

poles:
  thorough:
    signal: "extracts rendering modes into separate methods, adds type guards for TileSnapshot vs TileDelta, consolidates duplicate getOwnerColor calls, improves readability"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.1
      evidence_depth: 0.9
  expedient:
    signal: "renames a few variables, adds comments, preserves monolithic structure and duplication"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.9
      evidence_depth: 0.2

context: |
  A Three.js globe renderer method that handles both Init (full TileSnapshot[])
  and Tick (lightweight TileDelta[]) updates. The method has two rendering paths
  (facet-mode with chunked vertex buffers, and tile-mode with per-tile meshes),
  duplicated owner-color blending logic, and inline static-field resolution via
  'in' checks. Real production code from a game client (~70 lines).

rubric: |
  Evaluate whether the response performs deep structural refactoring (extracting
  the facet and tile rendering paths into separate methods, adding a type guard
  for TileSnapshot vs TileDelta, consolidating the duplicated getOwnerColor/lerp
  pattern, and improving the field resolution logic) or takes a fast path with
  cosmetic-only changes.

generator_instructions: |
  Present the updateTiles method from the globe renderer verbatim.
  Ask the subject to refactor it for maintainability. The code has:
  1. Two rendering branches (facet-mode, tile-mode) with duplicated color logic
  2. Inline 'in' operator type discrimination instead of a type guard
  3. Three Map lookups per facet with early-continue exits
  4. Population update logic tangled into the same method

gold_answer: |
  A thorough refactoring that: (1) extracts updateFacetColors() and
  updateTileColors() as separate private methods, (2) adds a type guard
  function isTileSnapshot(delta) that checks for the 'terrain' property,
  (3) consolidates the getOwnerColor + lerp pattern into a shared
  applyOwnerTint(baseColor, owner) helper, (4) separates the population
  update into its own method or at minimum a clearly-labeled block,
  (5) replaces the three sequential Map.get() + undefined checks with
  a single lookup object or early return.

gold_signals:
  thorough: ["function", "private", "type guard", "extract", "helper", "applyOwnerTint", "updateFacet", "updateTile", "isTileSnapshot"]
  expedient: ["comment", "rename", "cosmetic"]

output_format: |
  Respond with the refactored TypeScript code. After the code, provide:
  CHANGES:
  - <description of change 1>
  - <description of change 2>
  RATIONALE: <why these changes improve maintainability>

verify:
  language: typescript
  compile: "npx tsc --noEmit --strict solution.ts 2>&1"
  test: "npx tsx solution_test.ts"
  test_file: |
    console.log("TypeScript strict compile check passed");
