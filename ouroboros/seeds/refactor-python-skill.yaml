name: refactor-python-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, evidence_depth]
category: SKILL
difficulty: easy

poles:
  thorough:
    signal: "adds type hints, docstrings, uses list comprehension, proper error handling"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.1
      evidence_depth: 0.9
  expedient:
    signal: "minimal cosmetic changes, preserves original structure, quick fixes only"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.9
      evidence_depth: 0.2

context: |
  A Python function with poor naming, no type hints, no docstrings, and raw string
  concatenation. The code is functionally correct but needs refactoring for
  maintainability and Pythonic style.

rubric: |
  Evaluate whether the response performs deep structural refactoring (type hints,
  docstrings, list comprehensions, proper error handling) or takes a fast path
  with minimal surface-level changes.

generator_instructions: |
  Create a realistic Python function (25-40 lines) with intentionally messy code:
  poor variable names (x, y, tmp), no type hints, no docstrings, raw string
  concatenation instead of f-strings or join, and no error handling. The function
  should be functionally correct but in need of refactoring.

gold_answer: |
  Adds type hints, docstrings, uses list comprehension, proper error handling.

gold_signals:
  thorough: ["def ", "-> ", "\"\"\"", "typing", "List", "comprehension"]
  expedient: ["cosmetic", "unchanged"]

output_format: |
  Refactored code then CHANGES section:
  CHANGES:
  - <description of change 1>
  - <description of change 2>

verify:
  language: python
  compile: "python3 -m py_compile solution.py"
  test: "python3 solution_test.py"
  benchmark: "python3 -c 'import timeit; t=timeit.timeit(\"exec(open(\"solution.py\").read())\", number=100); print(f\"{t:.3f}s\")'"
  benchmark_threshold_ms: 10000
  test_file: |
    import importlib.util, sys, unittest
    spec = importlib.util.spec_from_file_location("solution", "solution.py")
    mod = importlib.util.module_from_spec(spec)
    spec.loader.exec_module(mod)

    class TestRefactored(unittest.TestCase):
        def test_has_type_hints(self):
            import inspect
            src = inspect.getsource(mod)
            self.assertIn("->", src, "Expected return type hint")

        def test_has_docstring(self):
            funcs = [f for f in dir(mod) if callable(getattr(mod, f)) and not f.startswith("_")]
            self.assertTrue(len(funcs) > 0, "No public functions found")
            for name in funcs:
                fn = getattr(mod, name)
                self.assertIsNotNone(fn.__doc__, f"{name} missing docstring")

    if __name__ == "__main__":
        unittest.main()
