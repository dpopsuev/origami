name: refactor-rust-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, evidence_depth]
category: SKILL
difficulty: medium

poles:
  thorough:
    signal: "uses iterators, proper error types, eliminates clones"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.1
      evidence_depth: 0.9
  expedient:
    signal: "minimal cosmetic changes, preserves clones and raw indexing"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.9
      evidence_depth: 0.2

context: |
  A Rust function with unnecessary clones, raw indexing, and no iterators. The
  code compiles and runs but violates idiomatic Rust patterns and allocates
  unnecessarily.

rubric: |
  Evaluate whether the response performs idiomatic refactoring (iterators, Result
  types, eliminating clones, doc comments) or takes a fast path with minimal
  surface-level changes.

generator_instructions: |
  Create a realistic Rust function (30-50 lines) with intentionally suboptimal
  code: unnecessary .clone() calls, raw indexing with [i], no use of iterators,
  unwrap() instead of proper error handling, and no doc comments. The function
  should compile and be functionally correct but in need of refactoring.

gold_answer: |
  Uses iterators, proper error types, eliminates clones.

gold_signals:
  thorough: ["iter()", "map(", "Result<", "impl", "///"]
  expedient: ["clone()", "unwrap()"]

output_format: |
  Refactored code then CHANGES section:
  CHANGES:
  - <description of change 1>
  - <description of change 2>

verify:
  language: rust
  compile: "rustc solution.rs --edition 2021 -o solution_bin 2>&1"
  test: "rustc --test solution_test.rs --edition 2021 -o test_bin 2>&1 && ./test_bin"
  test_file: |
    // Minimal smoke test: file compiles and has public functions
    // Actual correctness depends on the generated stimulus
    fn main() {
        println!("Rust compile+link check passed");
    }
