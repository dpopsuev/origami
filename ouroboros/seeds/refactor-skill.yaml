name: refactor-skill
version: "1.1"
dimensions: [speed, shortcut_affinity, evidence_depth]
category: SKILL
difficulty: easy

poles:
  thorough:
    signal: "renames variables for clarity, splits functions, adds doc comments, restructures control flow"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.1
      evidence_depth: 0.9
  expedient:
    signal: "minimal changes, preserves original structure, quick cosmetic fixes only"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.9
      evidence_depth: 0.2

context: |
  A Go function that works but has poor naming, long methods, missing error handling,
  and tangled control flow. The code is production-ready functionally but needs
  refactoring for maintainability.

rubric: |
  Evaluate whether the response performs deep structural refactoring (renames,
  function splits, error handling improvements, doc comments) or takes a fast
  path with minimal surface-level changes.

generator_instructions: |
  Create a realistic Go function (30-50 lines) with intentionally messy code:
  poor variable names (x, y, tmp), a long function body that should be split,
  missing error handling, and no comments. The function should be functionally
  correct but in need of refactoring.

gold_answer: |
  A thorough refactoring that: (1) renames all single-letter variables to
  descriptive names, (2) extracts at least two helper functions from the
  monolithic body, (3) wraps all fallible operations in error checks with
  context, (4) adds a doc comment explaining the function's purpose and
  return semantics.

gold_signals:
  thorough: ["func ", "error", "return fmt.Errorf", "// ", "renamed", "extract"]
  expedient: ["cosmetic", "minor", "unchanged structure"]

output_format: |
  Respond with the refactored Go code. After the code block, provide a
  CHANGES section listing each refactoring applied:
  CHANGES:
  - <description of change 1>
  - <description of change 2>

verify:
  language: go
  compile: "go build ./..."
  test: "go test -run TestRefactored ./..."
  benchmark: "go test -bench=BenchmarkRefactored -benchtime=1s ./..."
  benchmark_threshold_ms: 5000
  test_file: |
    package main

    import (
      "testing"
    )

    func TestRefactored_PositiveSum(t *testing.T) {
      got, _, err := d([]int{1, 2, 3}, "test", false)
      if err != nil { t.Fatal(err) }
      if got != 6 { t.Errorf("got %d, want 6", got) }
    }

    func TestRefactored_EmptyReturnsError(t *testing.T) {
      _, _, err := d([]int{0}, "x", false)
      if err == nil { t.Fatal("expected error for zero sum") }
    }
