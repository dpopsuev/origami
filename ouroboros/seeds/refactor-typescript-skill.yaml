name: refactor-typescript-skill
version: "1.0"
dimensions: [speed, shortcut_affinity, evidence_depth]
category: SKILL
difficulty: easy

poles:
  thorough:
    signal: "proper generics, Result type, reduce/filter, JSDoc"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.1
      evidence_depth: 0.9
  expedient:
    signal: "minimal cosmetic changes, preserves any types and assertions"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.9
      evidence_depth: 0.2

context: |
  A TypeScript function with `any` types, no generics, and union return type.
  The code runs but loses type safety and is not idiomatic TypeScript.

rubric: |
  Evaluate whether the response performs deep type-level refactoring (generics,
  proper interfaces, reduce/filter, JSDoc) or takes a fast path with minimal
  surface-level changes.

generator_instructions: |
  Create a realistic TypeScript function (25-40 lines) with intentionally weak
  typing: `any` parameters, no generics, union return types, type assertions
  (as), non-null assertions (!), and no JSDoc. The function should be
  functionally correct but in need of refactoring.

gold_answer: |
  Proper generics, Result type, reduce/filter, JSDoc.

gold_signals:
  thorough: ["<T>", "interface", "readonly", "reduce", "filter"]
  expedient: ["any", "as ", "!"]

output_format: |
  Refactored code then CHANGES section:
  CHANGES:
  - <description of change 1>
  - <description of change 2>

verify:
  language: typescript
  compile: "npx tsc --noEmit --strict solution.ts 2>&1"
  test: "npx tsx solution_test.ts"
  test_file: |
    // Smoke test: TypeScript strict mode check
    // Verifies the solution compiles under strict mode
    console.log("TypeScript strict compile check passed");
