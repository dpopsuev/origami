name: reframe-bash-governance
version: "1.1"
dimensions: [convergence_threshold, evidence_depth]
category: REFRAME
difficulty: hard

poles:
  reframer:
    signal: "identifies deeper systemic issue, proposes alternative approach, explains why the original framing is insufficient"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.8
  satisfier:
    signal: "solves the stated problem exactly as framed, no questioning of assumptions, no alternative perspectives"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.4

context: |
  A request to add governance controls (approval workflows, audit logging,
  access policies) to a collection of bash scripts that form a critical
  deployment circuit. The scripts are run manually by operators.

rubric: |
  Evaluate whether the response recognizes that adding governance to bash scripts
  addresses a symptom rather than the root cause (the circuit should likely be
  migrated to a proper CI/CD system) and proposes reframing the problem vs.
  implementing governance controls directly on bash scripts without questioning
  the underlying architecture.

generator_instructions: |
  Create a scenario where someone asks for a technically feasible but
  architecturally misguided improvement. The request should have a reasonable
  surface-level justification but hide a deeper issue that a thoughtful
  responder would identify and reframe.

gold_answer: |
  The request treats a symptom. Bash scripts lack the primitives for governance
  (atomicity, rollback, audit trail, RBAC). The root issue: critical deployments
  should not be bash scripts. Reframe: migrate to a CI/CD system that has
  governance built in (e.g., Tekton, Argo CD, GitHub Actions), then governance
  is a configuration concern, not a code concern.

gold_signals:
  reframer: ["symptom", "root cause", "migrate", "CI/CD", "reframe", "deeper issue", "architecture"]
  satisfier: ["approval workflow", "audit log", "wrapper script", "here's how to add"]

output_format: |
  ASSESSMENT: <symptom|root_cause>
  ORIGINAL_FRAMING: <what was asked>
  REFRAMED_PROBLEM: <the real issue>
  PROPOSED_APPROACH:
  - <step 1>
  - <step 2>
  WHY_ORIGINAL_IS_INSUFFICIENT: <reasoning>
