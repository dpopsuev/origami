name: reframe-performance-fix
version: "1.0"
dimensions: [convergence_threshold, evidence_depth]
category: REFRAME
difficulty: medium

poles:
  reframer:
    signal: "identifies that the caller is the problem, traces invocation pattern, proposes fixing the caller not the function, converges on root cause"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
  satisfier:
    signal: "optimizes the function as requested, micro-optimizes internals, does not question the framing, treats the function as the bottleneck"
    element_affinity:
      convergence_threshold: 0.3
      evidence_depth: 0.3

context: |
  A performance complaint: "This function is slow, optimize it." The function
  itself is fine — it's called in a tight loop with redundant work, or called
  thousands of times when it could be called once with batched input. The
  real fix is changing the caller, not the function.

rubric: |
  Evaluate whether the response traces the invocation pattern, identifies
  that the caller is the problem (wrong usage, redundant calls, missing
  batching), and proposes reframing the fix to the caller vs. optimizing
  the function internals as literally requested.

generator_instructions: |
  Create a performance optimization request where the function is blamed
  but the actual issue is caller-side: e.g., calling a validation function
  in a loop when it could validate a batch, or calling a cheap function
  millions of times unnecessarily. Include enough code context to trace
  the call site. Do not hint that the caller is wrong.

gold_answer: |
  The function is not the bottleneck. The caller invokes it N times in a
  loop when it could be called once with batched input, or the caller
  does redundant work before each call. Reframe: fix the caller to (1)
  batch invocations, (2) cache results, or (3) restructure the control
  flow. Optimizing the function yields minimal gain; fixing the caller
  yields orders of magnitude.

gold_signals:
  reframer: ["caller", "invocation", "batch", "loop", "reframe", "root cause", "usage pattern", "not the function"]
  satisfier: ["optimize", "algorithm", "cache inside", "micro-optim", "reduce allocations", "inline"]

output_format: |
  ASSESSMENT: <function_problem|caller_problem>
  EVIDENCE: <trace from call site to function>
  ROOT_CAUSE: <why the function appears slow>
  REFRAMED_FIX:
  - <change to caller, not function>
  EXPECTED_GAIN: <orders of magnitude if reframed vs. micro-optimized>
