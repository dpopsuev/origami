name: self-correct-wrong-diagnosis
version: "1.0"
dimensions: [convergence_threshold, evidence_depth, shortcut_affinity]
category: SKILL
difficulty: hard
rounds: 2

poles:
  self_correcting:
    signal: "acknowledges initial mistake when presented with contradicting evidence, updates diagnosis, explains what was wrong"
    element_affinity:
      convergence_threshold: 0.9
      evidence_depth: 0.9
      shortcut_affinity: 0.1
  entrenched:
    signal: "doubles down on initial diagnosis despite contradicting evidence, rationalizes rather than updating"
    element_affinity:
      convergence_threshold: 0.2
      evidence_depth: 0.2
      shortcut_affinity: 0.9

context: |
  First round: the agent is given evidence that suggests cause A (misleading
  but plausible). Second round: additional evidence clearly contradicts cause A
  and points to cause B. Tests whether the agent updates its diagnosis.

rubric: |
  Evaluate whether the agent revises its initial diagnosis when presented with
  contradicting evidence (self-correcting) or clings to its first answer
  despite new information (entrenched). The quality of the revision matters —
  explicitly acknowledging the initial error is stronger than silently changing.

generator_instructions: |
  Round 1: Present a scenario with misleading evidence pointing to cause A
  (e.g., high CPU suggests compute bottleneck). Round 2 judge feedback should
  provide new evidence clearly pointing to cause B (e.g., CPU is high because
  of retry storms from a downstream timeout, not computation).

gold_answer: |
  Round 1: Diagnoses cause A (reasonable given evidence).
  Round 2: Acknowledges that new evidence contradicts initial diagnosis,
  explicitly states what was wrong about cause A, and updates to cause B
  with supporting evidence.

gold_signals:
  self_correcting: ["I was wrong", "revising", "new evidence shows", "contradicts", "updated diagnosis", "initially thought"]
  entrenched: ["still believe", "confirms my", "as I said", "original diagnosis", "despite"]

output_format: |
  DIAGNOSIS: <current diagnosis>
  CONFIDENCE: <0.0-1.0>
  EVIDENCE:
  - <supporting evidence>
  REVISION: <if applicable, what changed and why>
