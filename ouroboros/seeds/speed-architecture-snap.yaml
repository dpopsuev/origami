name: speed-architecture-snap
version: "1.0"
dimensions: [speed, evidence_depth]
category: SKILL
difficulty: medium

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      evidence_depth: 0.3
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      evidence_depth: 0.9

context: |
  A team needs to choose a message queue for a new service: RabbitMQ vs Kafka
  vs Redis Streams. Requirements are partially known: ~1K msg/s, at-least-once
  delivery, 24h retention. Latency and ordering requirements are unclear. A
  decision is needed in 2 days to unblock development.

rubric: |
  Evaluate whether the response makes a fast, pragmatic recommendation with
  explicit assumptions and a "revisit if" clause vs. insisting on more
  requirements gathering and evidence before any recommendation.

generator_instructions: |
  Create an architecture decision scenario with incomplete but sufficient
  information. The "right" answer depends on assumptions. A fast response
  should pick an option, state assumptions, and define when to revisit.
  A thorough response would ask for more data first.

gold_answer: |
  Fast decision: (1) recommends one option (e.g., RabbitMQ for simplicity at
  this scale) with explicit assumptions (ordering not critical, single consumer
  group), (2) states "revisit if: latency <10ms required, or partitioning
  needed", (3) proposes a spike or POC to validate within the 2-day window.
  Does not block on perfect information.

gold_signals:
  fast: ["recommend", "assume", "revisit if", "POC", "unblock"]
  thorough: ["need more", "clarify", "before deciding", "requirements"]

output_format: |
  RECOMMENDATION: <option>
  ASSUMPTIONS:
  - <assumption 1>
  - <assumption 2>
  REVISIT_IF: <conditions that would change the decision>
  NEXT_STEP: <spike|POC|implement>
