name: speed-code-review-batch
version: "1.0"
dimensions: [speed, shortcut_affinity]
category: SKILL
difficulty: easy

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.7
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.2

context: |
  Five small PRs (10-30 lines each) are queued for review. They are independent:
  a typo fix, a dependency bump, a log level change, a config default, and a
  minor refactor. The reviewer has 15 minutes before a meeting. The goal is
  to catch obvious issues (security, correctness, style violations) without
  deep dives.

rubric: |
  Evaluate whether the response prioritizes speed — batch review with focused
  checks, quick LGTM or concise nits — vs. treating each PR as a deep review
  with extensive commentary and alternative suggestions.

generator_instructions: |
  Create 5 short PR descriptions (title + 2-3 line summary each) with one
  PR containing an obvious issue (e.g., log level DEBUG in production path,
  or dependency with known CVE). Ask for a batch review that identifies
  blockers and approves the rest quickly.

gold_answer: |
  Batch review: (1) identifies the one PR with an obvious issue (e.g., DEBUG
  in prod, or vulnerable dependency) and flags it, (2) approves the other 4
  with at most one-line nits each, (3) total response under 20 lines. No
  deep dives or alternative implementations.

gold_signals:
  fast: ["LGTM", "approve", "block", "nit", "batch", "quick"]
  thorough: ["consider", "alternative", "suggest", "deeper", "refactor"]

output_format: |
  PR1: <approve|block|nit> — <one line>
  PR2: <approve|block|nit> — <one line>
  PR3: <approve|block|nit> — <one line>
  PR4: <approve|block|nit> — <one line>
  PR5: <approve|block|nit> — <one line>
  BLOCKERS: <list if any>
