name: speed-hotfix-vs-rollback
version: "1.0"
dimensions: [speed, failure_mode]
category: TRAP
difficulty: medium

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      failure_mode: 0.2
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      failure_mode: 0.9

context: |
  A production deploy 20 minutes ago introduced a bug. A hotfix is ready: a
  one-line change that fixes the issue. Rolling back would restore the previous
  version in ~5 minutes. The hotfix would require building, testing, and
  deploying — estimated 15 minutes. Hotfix "feels" faster because it "fixes"
  the problem; rollback "feels" slower because it "reverts" progress. The trap:
  hotfix adds new code under pressure and can introduce a second bug.

rubric: |
  Evaluate whether the response falls for the trap — recommending hotfix
  because it seems to "fix" the issue and appears proactive — vs. recognizing
  that rollback is the safer, often faster path: known-good state, no new
  code, lower risk of compounding failure.

generator_instructions: |
  Create a scenario where both hotfix and rollback are viable. Frame the
  hotfix as "ready" and "quick" to make it superficially attractive. A
  trap-prone response will prefer hotfix. A failure-mode-aware response will
  prefer rollback and reserve hotfix for when rollback is impossible or
  clearly worse.

gold_answer: |
  Rollback first: (1) restores known-good state in 5 minutes, (2) avoids
  introducing new code under pressure, (3) hotfix can be applied in the next
  release window with proper review. The trap: hotfix looks like "fixing"
  but adds risk; rollback is the safer speed play. Only choose hotfix if
  rollback is blocked (e.g., data migration already applied).

gold_signals:
  fast: ["hotfix", "fix now", "deploy", "one line"]
  thorough: ["rollback", "known-good", "safer", "trap", "risk", "under pressure"]

output_format: |
  RECOMMENDATION: <rollback|hotfix>
  RATIONALE: <why>
  TRAP_AVOIDED: <what superficial choice was rejected and why>
  NEXT_STEP: <when to apply the other option>
