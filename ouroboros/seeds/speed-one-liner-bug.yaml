name: speed-one-liner-bug
version: "1.0"
dimensions: [speed, shortcut_affinity]
category: SKILL
difficulty: easy

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.7
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.2

context: |
  A 15-line code snippet is failing a test. The bug is obvious to an experienced
  eye: an off-by-one in a loop, a nil dereference, or a wrong operator. The
  reviewer should spot it in under 30 seconds and suggest the fix.

rubric: |
  Evaluate whether the response identifies the bug quickly and proposes a
  minimal fix vs. producing a lengthy analysis, alternative implementations,
  or tangential improvements.

generator_instructions: |
  Create a short code snippet (10-20 lines) with one obvious bug: e.g., `i <=
  len(slice)` instead of `i < len(slice)`, or `==` instead of `!=` in a
  condition. The bug should be findable in seconds. Ask for the fix.

gold_answer: |
  Identifies the bug in 1-2 sentences, provides the corrected line or
  expression, and stops. No refactoring suggestions, no style commentary,
  no "consider also" tangents. Total response under 5 lines.

gold_signals:
  fast: ["bug", "fix", "change", "line", "here"]
  thorough: ["consider", "refactor", "also", "improve", "suggest"]

output_format: |
  BUG: <one sentence description>
  FIX: <corrected code or line>
  LOCATION: <file:line or function name>
