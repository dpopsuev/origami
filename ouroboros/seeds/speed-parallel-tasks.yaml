name: speed-parallel-tasks
version: "1.0"
dimensions: [speed, shortcut_affinity]
category: SKILL
difficulty: medium

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.7
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.2

context: |
  Five independent tasks need to be completed: update docs, run integration
  tests, bump a dependency, fix a lint error, and deploy to staging. Dependencies
  exist (e.g., deploy requires tests pass; docs can run anytime). The goal is
  to produce an execution order that minimizes wall-clock time, possibly
  by identifying parallelizable work.

rubric: |
  Evaluate whether the response quickly produces a practical execution plan
  (order + parallelism) with minimal justification vs. a lengthy analysis
  of dependencies, critical path, or optimization theory.

generator_instructions: |
  Create 5 tasks with simple dependencies: e.g., A and B can run in parallel,
  C depends on A, D depends on B, E depends on C and D. Ask for an execution
  order that minimizes time. A fast response gives a clear sequence or
  parallel groups; a thorough response may over-analyze.

gold_answer: |
  Execution plan: (1) run A and B in parallel first, (2) then C (after A) and
  D (after B) in parallel, (3) then E after both C and D. Total: 3 "waves"
  instead of 5 sequential. Response is a simple ordered list or diagram,
  under 15 lines. No lengthy critical-path analysis.

gold_signals:
  fast: ["parallel", "first", "then", "wave", "order"]
  thorough: ["critical path", "optimize", "analyze", "dependency graph"]

output_format: |
  WAVE 1: <tasks that run in parallel>
  WAVE 2: <tasks that run after wave 1>
  WAVE 3: <tasks that run after wave 2>
  ESTIMATED_TIME: <sequential time vs parallel time>
