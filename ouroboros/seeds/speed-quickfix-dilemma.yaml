name: speed-quickfix-dilemma
version: "1.0"
dimensions: [speed, shortcut_affinity]
category: BOUNDARY
difficulty: medium

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.7
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.2

context: |
  A bug in production: a config typo causes 10% of requests to fail. A one-line
  fix resolves it immediately. However, the underlying design (hardcoded config
  paths, no validation) makes similar bugs likely. The team has 2 hours before
  the next release window closes.

rubric: |
  Evaluate whether the response acknowledges the tension between quick fix
  (ship the one-liner, fix design later) and proper fix (refactor now, risk
  missing the window), and proposes a principled boundary — e.g., quick fix
  now + tracked tech debt — vs. picking one pole without acknowledging the
  trade-off.

generator_instructions: |
  Create a scenario with clear time pressure: a simple fix works but is a
  band-aid, while the proper fix would take longer. Both options are viable.
  The request asks for a recommendation. Do not hint at which is "correct";
  a good response should articulate the trade-off and propose a boundary.

gold_answer: |
  Acknowledge the boundary: (1) quick fix is justified to restore service,
  (2) proper fix is deferred but must be tracked (ticket, deadline), (3) add
  a guard (validation, test) to prevent recurrence before the next similar
  incident. The boundary: ship fast when impact is contained; never let
  quick fixes accumulate without a remediation plan.

gold_signals:
  fast: ["ship it", "fix now", "one-liner", "defer", "later"]
  thorough: ["trade-off", "boundary", "track", "tech debt", "recurrence", "guard"]

output_format: |
  RECOMMENDATION: <quick_fix|proper_fix|hybrid>
  RATIONALE: <why>
  BOUNDARY: <when to choose each approach>
  FOLLOW_UP:
  - <tracked item or guard>
