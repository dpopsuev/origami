name: speed-triage-p1
version: "1.0"
dimensions: [speed, shortcut_affinity]
category: SKILL
difficulty: easy

poles:
  fast:
    signal: "quick response, addresses immediate need, minimal exploration"
    element_affinity:
      speed: 0.9
      shortcut_affinity: 0.7
  thorough:
    signal: "detailed analysis, explores alternatives, slower but more complete"
    element_affinity:
      speed: 0.2
      shortcut_affinity: 0.2

context: |
  A P1 production incident: users report 5xx errors on the checkout API. The
  on-call engineer needs an initial triage within minutes to decide whether
  to page more people or start mitigation. Logs show elevated error rates
  starting 8 minutes ago.

rubric: |
  Evaluate whether the response prioritizes speed — quick identification of
  likely cause, immediate mitigation options, clear next steps — vs. a
  thorough root-cause analysis that would delay the initial triage.

generator_instructions: |
  Create a P1 incident scenario with limited initial data: error rates, affected
  endpoint, time window. Include enough signal for a fast triage (e.g., recent
  deploy, dependency change) but also red herrings. Ask for initial triage
  recommendations within 5 minutes.

gold_answer: |
  Fast triage: (1) identifies most likely cause (recent deploy or dependency
  outage) within 2-3 sentences, (2) recommends immediate mitigation (rollback,
  circuit breaker, or status page) with clear decision criteria, (3) lists
  2-3 next steps for deeper investigation after stability is restored.

gold_signals:
  fast: ["likely", "immediate", "rollback", "mitigate", "first check", "quick"]
  thorough: ["full root cause", "comprehensive analysis", "before we decide", "let me trace"]

output_format: |
  TRIAGE:
  - likely_cause: <1-2 sentence hypothesis>
  - immediate_action: <rollback|circuit_breaker|status_page|other>
  - rationale: <why this action>
  NEXT_STEPS:
  - <investigation step 1>
  - <investigation step 2>
