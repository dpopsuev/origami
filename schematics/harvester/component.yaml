component: origami-harvester
module: github.com/dpopsuev/origami/schematics/harvester
namespace: harvester
version: "0.1.0"
description: Unified harvester access layer with pluggable drivers
factory: NewRouter
serve: schematics/harvester/cmd/serve
adapter: NewMCPReader
requires:
  origami: ">=0.3.0"
  sockets:
    - name: git
      type: Driver
      option: WithGitDriver
      description: Git repository driver for source code access
    - name: docs
      type: Driver
      option: WithDocsDriver
      description: HTTP documentation driver for web-based docs
