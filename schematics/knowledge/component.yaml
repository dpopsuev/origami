component: origami-knowledge
module: github.com/dpopsuev/origami/schematics/knowledge
namespace: knowledge
version: "0.1.0"
description: Unified knowledge access layer with pluggable drivers
factory: NewRouter
serve: schematics/knowledge/cmd/serve
adapter: NewMCPReader
requires:
  origami: ">=0.3.0"
  sockets:
    - name: git
      type: Driver
      option: WithGitDriver
      description: Git repository driver for source code access
    - name: docs
      type: Driver
      option: WithDocsDriver
      description: HTTP documentation driver for web-based docs
