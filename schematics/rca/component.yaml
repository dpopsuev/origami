component: origami-rca
namespace: rca
version: "1.0.0"
description: RCA circuit plumbing for CI root-cause analysis
provides:
  transformers: [context-builder, prompt-filler]
  extractors: [recall, triage, resolve, investigate, correlate, review, report]
  hooks: [store.recall, store.triage, store.investigate, store.correlate, store.review]
requires:
  origami: ">=0.3.0"
  sockets:
    - name: store
      type: store.Store
      option: WithStore
      description: Persistent storage backend (built-in SQLite default)
    - name: source
      type: SourceReader
      option: WithSourceReader
      description: Reads test failure data from an external tracker
    - name: writer
      type: DefectWriter
      option: WithDefectWriter
      description: Writes RCA results back to the external tracker
    - name: discoverer
      type: RunDiscoverer
      option: WithRunDiscoverer
      description: Discovers available CI runs and their failures
    - name: code
      type: CodeReader
      option: WithCodeReader
      description: Read-only access to source code repositories for evidence gathering