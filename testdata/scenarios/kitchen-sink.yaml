circuit: kitchen-sink
description: "Exercises zones, when expressions, shortcuts, hooks, input resolution, prompt rendering, vars, schema"

vars:
  threshold: 0.85

zones:
  intake:
    nodes: [classify]
    approach: rapid
    stickiness: 0
  analysis:
    nodes: [analyze, review]
    approach: analytical
    stickiness: 2
  output:
    nodes: [report]
    approach: holistic
    stickiness: 1

nodes:
  - name: classify
    approach: rapid
    transformer: echo
    after: [track-node]
    schema:
      required: [type]
      properties:
        type: {type: string}
  - name: analyze
    approach: analytical
    transformer: echo
    input: "${classify.output}"
    prompt: "Analyze with threshold {{.Config.threshold}}"
  - name: review
    approach: rigorous
    transformer: echo
  - name: report
    approach: holistic
    transformer: echo

edges:
  - id: shortcut
    name: high-confidence shortcut
    from: classify
    to: report
    shortcut: true
    when: "output.confidence >= config.threshold"

  - id: normal
    name: needs analysis
    from: classify
    to: analyze
    when: "true"

  - id: analyzed
    name: analysis complete
    from: analyze
    to: review
    when: "true"

  - id: approved
    name: review approved
    from: review
    to: report
    when: "true"

  - id: done
    name: final
    from: report
    to: _done
    when: "true"

start: classify
done: _done
